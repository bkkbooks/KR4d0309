body:
  text: 番陽姜䕫堯章五言律詩題華亭錢參園池花裏藏仙宅簾邊駐客舟浦涵滄海潤雲接洞庭秋草木山山秀闌干處處幽機雲韜世業暇日此夷猶同朴翁登卧龍山龍尾回平野簷牙出翠微望山憐緑逺坐樹覺春歸草合平吳路鷗忘霸越機午涼松影亂白羽對禪衣坐上和約齊句入冰輪冷愁因玉宇開可無如此客猶恨不能杯好句長城立寒鴉結陳來箜篌莫停手拚却斷腸回出北關吳兒臨水宅四面見行舟蒲葉侵鵝項楊枝蘸馬頭年年人去國夜夜月窺樓傳語城中客功名半是愁答沈器之二首江漢乘流客乾坤不繫舟玉琴虛素月金劍落清秋野鹿知隨草飢鷹故上鞲風流大隄曲一唱使人愁涉逺身良苦登髙望欲迷試吟青玉案不是白銅鞮露下秋蟲怨風髙北馬嘶槎頭有新味人在太湖西悼石湖三首身退詩仍健官髙病已侵江山平日眼花鳥暮年心九轉終無助三髙竟欲尋尚留巾墊角胡虜有知音未作龍蛇夢驚聞露電身百年無此老千首屬何人安得公長健那知事轉新酸風憂國淚髙冢卧麒麟未定情鍾痛何堪更悼亡遺書知伏枕來弔只空堂雪裏評詩句梅邊按樂章沈思酒杯落天濶意一作正茫茫七言律詩送朝天續集歸誠齊時在金陵翰墨場中老斫輪真能一筆掃千軍年年花月無間日處處山川怕見君箭在的中非爾力風行水上自成文先生只可三千首回施江東日暮雲寄上張參政姑蘇臺下梅花樹應為調羮故早開燕寢休誇香霧重鴛行却望衮衣來前時甲第仍垂栁今度沙隄已種槐應念無枝夜飛鵲月寒風徑羽毛摧京口留别張思順伯勞飛燕若為忙還憶東齊夜共牀别後無書非棄我春前會面却他鄉連宵為說經憂患異日相逢各老蒼更欲少留天不許曉風吹艇入垂楊次朴翁遊蘭亭韵亞字橋亭面面風六人同坐樹陰中松交歸路如留客石礙流杯故惱公山色最憐秦望緑野花只作晉時紅夕陽啼鳥人將散俯仰興懷自昔同右軍祠堂有杜䳌花兩株極照灼次韵胡仲方因楊伯子見寄此去廬陵定幾程向來卬杖未經行懸知征棹雲邊集大有吟情雪裏生楚渡食萍應甚美舜祠吹玉直能清二君即日青冥上惟我春山帶雨耕仲方得萍鄉宰伯子得營道倅賀張肖翁參政太乙圖書客屢談已知上相出淮南銀臺日月非虛過金鼎功名得細參從此與人為雨露應憐有客卧雲嵐明朝起為蒼生賀旋著藤冠紫竹簪陳君玉以小集見歸用余還誠齊朝天續集韻作七字䕫報貺筆陳無功汗左輪而今老去不能軍水邊白鳥間於我窗外梅花疑是君欲向江湖行此語可無朋友託斯文新篇大是相料理因憶西山揚子雲寄田郎楚楚田郎亦大竒少年風味我曾知春城寒食誰相伴夜月梨花有所思剪燭屢呼金鑿落倚窗閒品玉參差含情不擬逢人說鸚鵡能歌自作詞送王德和提舉淮東京塵吹帽汗淋衣相見頻年只道歸省裏移文那得了家邊持節未為非煮乾碧海知誰用割盡黃雲尚告飢可得不為根本計秋風還見鴈南飛寄時父遲君日日數歸程到得君歸我已行一路好山思共看半年有酒不同傾吾儕正坐清貧纍各自而今白髮生人物渺然須强飯天工應不負才名送李萬頃猛相思裏得君來正喜歡時却便回别路恐無青栁折到家應有小桃開起居五馬兼堂上問信千巖及阿灰張禕姓張曙小字阿灰兒女癡頑夫婦健漂零何日共尊罍次韵千巖雜謡中散平生七不堪鳳塵時時伴燕談道士有神傳火棗故人無字入雲藍雨涼竹葉宜三酌日落荷花倚半酣極欲扁舟南蕩去冷鷗輕燕略相諳寄上鄭郎中梅根東望九華雲中有風流衣繡人名下一生勞夢想尊前數語倍情親節旄在道催歸漢花鳥留君且作春見說祥風挾時雨故園松菊亦精神送左真州還長沙吳兒牽挽醉蓴鱸今日西歸略自如别路冷雲隨驛馬望鄉喬木記吾廬湘中花月偏憐酒淮左兒童待擁車凡我舊遊君更歷橘洲相見訝無書乍涼寄朴翁前日松間步屧歸更將荷葉障秋暉如今城裏拋宫身同漢使來不同漢使歸雖為胡中婦只著漢家衣東堂聮句金風涼夜深吹我蕭蕭髮趙雍和仲起折丹桂枝驚落花上月白石與和甫時甫分題畫卷夔得剡溪圖枯槎啅乾鵲交臂失夫君奈此一尊酒慿髙空水雲六言絶句金神夜獵圖二首夜半金神羽獵奔走山川百靈雲氣旍旗來下颯然已入青冥後宫嬋娟玉女自鞚八尺飛龍兩兩鳴鞭爭導緑雲斜墜春風次韵鴛鴦梅二首晴日小溪沙暖春夢憐渠頸交只怕笛聲驚散費人月咏風嘲漠漠江南烟雨于飛似報初春折過女郎山下料應愁殺佳人馬上值牧兒馬背何如牛背短衣落日空山只麼身歸盤谷未須名滿人間七言絶句過湘陰寄千巖渺渺臨風思美人荻花楓葉帶離聲夜深吹笛移船去三十六灣秋月明雁圖萬里晴沙夕照西此心唯有斷雲知年年數盡秋風字想見江南搖落時除夜自石湖歸苕溪此詩録寄誠齊得報云所寄十詩有裁雲縫霧之妙思𫾣金戞玉之竒聲細草穿沙雪半銷吳宫烟冷水迢迢梅花竹裏無人見一夜吹香過石橋美人臺上昔歡娛今日空臺望五湖殘雪未融青草死苦無麋鹿過姑蘇黃帽傳呼睡不成投篙細細激一作擊流冰分明舊泊江南岸舟尾春風颭客燈千門列炬散林鴉兒女相思未到家應是不眠非守歲小窗春色入燈花三生定是陸天隨又向吳松作客歸已拚新年舟上過倩人和雪洗征衣沙尾風回一棹寒椒花今夕不登盤百年草草都如此自琢春詞剪燭看笠澤茫茫雁影微玉峯重疊護雲衣長橋寂寞春寒夜只有詩人一舸歸桑間篝火却宜𧖟風土相傳我未諳但得明年少行役只裁白紵作春衫少小知名翰墨場十年心事只凄涼舊時曾作梅花賦研墨於今亦自香環玦隨波冷未銷古苔留雪卧牆腰誰家玉笛吹春怨看見鵝黃上柳條臨安旅邸答蘇虞叟垂楊風雨小樓寒宋玉秋詞不忍看萬里青山無處隱可憐投老客長安姑蘇懷古夜暗歸雲繞柁牙江涵星影鷺眠沙行人悵望蘇臺桞曾與吳王掃落花次韻德久籬落青青花倒垂避人黃鳥雨中飛西郊寂寞無車馬時有溪童賣菜歸次石湖書扇韵橋西一曲水通村岸閣浮萍緑有痕家住石湖人不到藕花多處别開門竹友為徐南卿作髮已星星帶已寬徐卿猶自客長安家山竹好無由看漫種庭心一兩竿世路蒼黃總是愁暮年須得小優遊如今漸覺知心少賸種青青伴白頭夀朴翁與師同月不同年歸墨歸儒各自緣想得山中無夀酒但攜茶到菊花前湖上寓居雜咏荷葉披披一浦涼青蘆奕奕夜吟商平生最識江湖味聽得秋聲憶故鄉湖上風恬月淡時卧看雲影入玻瓈輕舟忽向窗邊過搖動青蘆一兩枝秋風低結亂山愁千頃銀波凝不流隄畔畫船隄上馬緑楊風裏兩悠悠處處虛堂望眼寬荷花荷葉過闌干逰人去後無歌鼓白水青山生晚寒輦路垂楊兩行栽苑門秋水欲平階朝朝南望宫雲起白鳥一雙山下來微波衝得緑萍開數點青青黏石階緑葑自來還自去來時須載白鷗來布衣何用揖王公歸向蘆根濯軟紅自覺此心無一事小魚跳出緑萍中囊封萬字總空言露滴桐枝欲斷絃時事悠悠吾亦懶卧看秋水浸山烟苑牆曲曲栁冥冥人靜山空見一燈荷葉似雲香不斷小船搖曵入西陵處士風流不並時移家相近若依依夜涼一舸孤山下林黑草深螢火飛卧榻看山緑漲天角門長泊釣魚船而今漸欲拋塵事未了菟裘一悵然鈎窗不忍見南山下有三雛骨未寒惆悵古今同此味二陵風雨晉師還栁下軒窗枕水開畫船忽載故人來與君同過西城路却指烟波獨自回指點移舟著栁隄美人相顧復相攜上橋更覺秋香重花在西陵小苑西平甫見招不欲往老去無心聽管絃病來杯酒不相便人生難得秋前雨乞我虛堂自在眠樓閣萬重秋雨裏峯巒四合暮潮邊鳳城今夕涼如水多少人家試管絃三髙祠越國霸來頭已白洛京歸後夢猶驚沈思只羡天隨子蓑笠寒江過一生過桐廬橫看山色仰看雲十幅風帆不藉人記取合江江畔樹他年此處好垂綸登烏石寺觀張魏公劉安成嶽武穆留題劉云侍兒意真奉命題記諸老凋零極可哀尚留名字壓崔嵬劉郎可是疏文墨幾點胭脂汙緑苔過垂虹自作新詞韵最嬌小紅低唱我吹簫曲終過盡松陵路回首烟波十四橋訪費山人稻叢茁茁欲齊肩楊栁僛僛不蔽蟬忽憶石頭城下路槿花斜壓釣魚船牛渚牛渚磯邊渺渺秋笛聲吹月下中流西風不識張京兆畫得蛾眉如許愁武康丞宅同朴翁詠牽牛青花緑葉上疏籬别有長條竹尾垂老覺淡妝差有味滿身秋露立多時朴公悼牽牛甚竒余亦作不見青青繞竹生西風籬落抱枯藤道人一任空花過愁殺山陰覔句僧過德清木末誰家縹眇亭畫堂臨水更虛明經過此處無相識塔下秋雲為我生溪上佳人看客舟舟中行客思悠悠烟波漸逺橋東去猶見闌干一點愁項里項里項王之里也在山陰西南二十餘里地多楊梅苔梅皆妙天下王性之賦項里楊梅云只今枝頭萬顆紅猶似咸陽三月火豫近得苔梅一株古怪特甚為作七言舊國婆娑幾樹梅將軍逐鹿未歸來江東父老空相憶枝上年年長緑苔雪中六解塞草汀雲護玉鞍連天花落路漫漫如今却憶當時健下馬題詩不怕寒黃鶴磯邊晚渡時柳花風急片帆飛一聲長笛魚龍舞白浪如山不肯歸萬馬行空轉屋簷髙寒屢索酒杯添故人家住吳山上借得西湖自捲簾曾泛扁舟訪石湖恍然坐我范寬圖天寒逺挂一行雁三十六峯生玉壼萬壑千巖一樣寒城中别有玉龍蟠舊人乘興扁舟處今日詩仙戴笠看沈香火裏笙簫合暖玉鞍邊雉兔空辦得煎茶有驕色先生只合作詩窮越中士女春逰秦山越樹兩依依閒倚闌干看落暉楊栁梢頭春又暗玉簫聲裏夜逰歸送范仲訥往合肥三首壯志只便鞍馬上客夢長在江淮間誰能辛苦運河裏夜與商人爭往還我家曾住赤闌橋鄰里相過不寂寥君若到時秋已半西風門巷栁蕭蕭小簾燈火屢題詩回首青山失後期未老劉郎定重到煩君說與故人知下孤城人家多在竹籬中楊栁疏疏尚帶風記得下菰城下路白雲依舊兩三峯平甫放三十六鷗於吳松余不及與盟橋下松陵緑浪橫來遲不與白鷗盟知君久對青山立飛盡梨花好句成蕭山歸心已逐晚雲輕又見越中長短亭十里水邊山下路桃花無數麥青青戊午春帖子晴窗日日擬雕蟲惆悵明時不易逢二十五絃人不識淡黃楊栁舞春風偶題阿八宫中酒未醒天風吹髮夜泠泠歸來只怕扶桑晚赤腳橫騎太乙鯨陳日華侍兒讀書繹句尋章久未休花房日晏不梳頭誰教郎主能多事乞與冥冥千古愁女郎山漢陽縣西二十里不見郢中能賦客可憐負此女郎山冰魂寂寞無歸處獨宿鴛鴦沙水寒釣雪亭闌干風冷雪漫漫惆悵無人把釣竿時有官船橋畔過白鷗飛去落前灘緑蕚梅黃雲承襪知何處招得冰魂付北枝金谷樓髙愁欲墮斷腸誰把玉龍吹次韵武伯楊柳風微約暮寒野禽容與只波間道人心性如天馬可愛青絲十二間觀燈口號十首世間形象盡成燈烘火旋紗巧思生列肆又多看不遍逰人一一把燈行市樓歌吹太喧譁燈若連珠照萬家太守令嚴君莫舞遊人空帶玉梅花遊人總戴孟家蟬爭託星毬萬眼圓鬧裏傳呼大官過後車多少盡嬋娟花帽籠頭幾歲兒女兒學著內人衣燈前月下無歸路不到天明亦不歸好燈須買不論錢别有琉璃價百千都下貴人多預賞買時長在一陽前珠絡琉璃到地垂鳳頭銜帶玉交枝君王不賞無人進天竺堂深夜雨時紛紛鐵馬小回旋幻出曹公大戰年若使英雄知事不教兒女戲燈前貴客鈎簾看御街市中珍品一時來簾前花架無行路不得金錢不肯回修內司人編戲鼓輦宫營裏獨燒燈春風到處皆君賜金栁絲絲滿鳯城正好嬉逰天作魔翠裙無奈雨沾何御街暗裏無燈火處處但聞樓上歌陪張平甫遊禹廟鏡裏山林緑到天春風只在禹祠前一聲何處提壺鳥猛省紅塵二十年寄俞子二首此郎都無子弟氣夜對黃妳籠青燈君今落腳墮鳶外欲往從之歎未能郎罷才名今白髮佐州亦復坐窮邊甚欲出手相料理東南風高難寄箋
