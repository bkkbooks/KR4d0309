front:
  text: 白石道人歌曲卷二
  hash: sha256:540ce42b6ccdc42fadb2a4eb08f43311f1d7af5d6aaea138c37dc5a827a4b429
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0309_SBCK_002-1a}
body:
  text: 番陽姜夔堯章令小重山令賦潭州紅梅人繞湘臯月墜時斜橫花樹小浸愁漪一春幽事有誰知東風冷香逺茜裙歸鷗去昔遊非遙憐花可可夢依依九疑雲杳斷魂啼相思血都沁緑筠枝江梅引丙辰之冬豫留梁溪將詣淮而不得因夢思以述志人間離别易多時見梅枝忽相思幾度小窗幽夢手同攜今夜夢中無覔處漫徘徊寒侵被尚未知濕紅恨墨淺封題寶箏空無雁飛俊遊巷陌算空有古木斜暉舊約扁舟心事已成非歌罷淮南春草賦又萋萋漂零客淚滿衣驀山溪題錢氏溪月與鷗為客緑野留吟屐兩行柳垂陰是當日仙翁手植一亭寂寞烟外帶愁橫荷冉冉展涼雲橫卧虹千尺才因老盡秀句君休覔萬緑正迷人更愁入山陽夜笛百年心事惟有玉闌知吟未了放船回月下空相憶鶯聲繞紅樓甲寅春平甫與豫自越來吳攜家妓觀梅于孤山之西村命國工吹笛妓皆以柳黃為衣十畝梅花作雪飛冷香下攜手多時兩年不到斷橋西長笛為豫吹人妬垂楊緑春風為染作仙衣垂楊却又妬腰肢近平聲前舞絲絲鬲溪梅令仙吕調丙辰冬自無錫歸作此寓意又旌陽宫殿昔裴徊一壇雲葉垂與君閒看壁間題夜涼笙鶴期茅店酒夀君時老楓臨路岐年年强健得追隨名山遊遍歸好事近賦茉莉涼夜摘花鈿苒苒動搖雲緑金絡一團香露正紗㕑人獨朝來碧縷放長穿叉頭罣層玉記得如今時候正荔枝初熟點絳唇丁未冬過吳松作燕鴈無心太湖西畔隨雲去數峯清苦商略黃昏雨第四橋邊擬共天隨住今何許憑闌懷古殘柳參差舞又金谷人歸緑楊低掃吹笙道數聲啼鳥也學相思調月落潮生掇送劉郎老淮南好甚時重到陌上生春草虞美人賦牡丹西園曾為梅花醉葉剪春雲細玉笙涼夜隔簾吹卧看花梢搖動一枝枝娉娉嫋嫋教誰惜空壓紗巾側沈香亭北又青苔唯有當時蝴蝶自飛來又摩挲紫蓋峯頭石下瞰蒼崖立玉盤搖動半崖花花樹扶疏一半白雲遮盈盈相望無由摘惆悵歸來屐而今仙迹杳難尋那日青樓曾見似花人憶王孫番陽彭氏小樓作冷紅葉葉下塘秋長與行雲共一舟零落江南不自由兩綢繆料得吟鸞夜夜愁少年遊戲平甫雙螺未合雙蛾先斂家在碧雲西別母情懷隨郎滋味桃葉渡江時扁舟載了匆匆歸去今夜泊前溪楊柳津頭梨花牆外心事兩人知鷓鴣天己酉之秋苕溪記所見京洛風流絶代人因何風絮落溪津籠鞋淺出鴉頭襪知是凌波縹眇身紅乍笑緑長嚬與誰同度可憐春鴛鴦獨宿何曾慣化作西樓一縷雲又豫與張平甫自南昌同遊西山玉隆宫止宿而返蓋乙卯三月十四日也是日即平甫初度因買酒茅舍竝坐古楓下古楓旌陽在時物也旌陽嘗以草屨懸其上土人以屨為屩因名曰挂屩楓蒼山四圍平野盡緑鬲澗野花紅白照影可喜使人採擷以藤糾纒著楓上少焉月出大於黃金盆逸興橫生遂成痛飲午夜乃寢明年平甫初度欲治舟往封禺松竹間念此遊之不可再也歌以夀之曾共君侯歷聘來去年今日踏莓苔旌陽宅裏疏疏磬挂屩楓前草草杯呼煮酒摘青梅今年官事莫裴徊移家徑入藍田縣急急船頭打鼓催又丁巳元日柏緑椒紅事事新鬲籬燈影賀年人三茅鐘動西窗曉詩鬢無端又一春慵對客緩開門梅花間伴老來身嬌兒學作人間字鬱壘神荼寫未真又正月十一日觀燈巷陌風光縱賞時籠紗未出馬先嘶白頭居士無呵殿只有乘肩小女隨花滿市月侵衣少年情事老來悲沙河塘上春寒淺看了遊人緩緩歸又元夕不出一昨天街預賞時柳慳梅小未教知而今正是歡遊夕却怕春寒自掩扉簾寂寂月低低舊情惟有絳都詞芙蓉影暗三更後卧聽鄰娃笑語歸又元夕有所夢肥水東流無盡期當初不合種相思夢中未比丹青見暗裏忽驚山鳥啼春未緑鬢先絲人間別久不成悲誰教歲歲紅蓮夜兩處沈吟各自知又十六夜出輦路珠簾兩行垂千枝銀燭舞僛僛東風歷歷紅樓下誰識三生杜牧之歡正好夜何其明朝春過小桃枝鼓聲漸逺行人散惆悵歸來有月知夜行船己酉歲寓吳興同田幾道尋梅北山沈氏圃載雪而歸略彴橫溪人不度聽流澌佩環無數屋角垂枝船頭生影算唯有春知處回首江南天欲暮折寒香倩誰傳語玉笛無聲詩人有句花休道輕分付杏花天影作新詩拚一日繞花千轉踏莎行自沔東來丁未元日至金陵江上感夢而作燕燕輕盈鶯鶯嬌軟分明又向華胥見夜長爭得薄情知春初早被相思染別後書辭別時針線離魂暗逐郎行逺淮南皓月冷千山冥冥歸去無人管訴衷情端午宿合路石榴一樹浸溪紅零落小橋東五日凄涼心事山雨打船篷諳世味楚人弓莫冲冲白頭行客不採蘋花孤負薰風浣溪紗豫女須家沔之山陽左白湖右雲夢春水方生浸數千里冬寒沙露衰草入雲丙午之秋豫與安甥或蕩舟採菱或舉火罝兔或觀魚簺下山行野吟自適其適􅑀虛悵望因賦此闋著酒行行滿袂風草枯霜鶻落晴空銷魂都在夕陽中恨入四弦人欲老夢尋千驛意難通當時何似莫匆匆又己酉歲客吳興收燈夜闔戶無聊俞商卿呼之不出因記所見春點疏梅雨後枝剪燈心事峭寒時市橋攜手步遲遲蜜炬來時人更好玉笙吹徹夜何其東風落靨不成歸又辛亥正月二十四日發合肥叉燕籠雲晚不忺擬將裙帶繫郎船別離滋味又今年楊柳夜寒猶自舞鴛鴦風急不成眠些兒間事莫縈牽又丙辰歲不盡五日吳松作雁怯重雲不肯啼畫船愁過石塘西打頭風浪惡禁持春浦漸生迎棹緑小梅應長亞門枝一年燈火要人歸又丙辰臘與俞商卿銛朴翁同寓新安溪莊舍得臘花韻甚二首花裏春風未覺時美人呵蕊綴橫枝鬲簾飛過蜜蜂兒書寄嶺頭封不到影浮杯面誤人吹寂寥惟有夜寒知又剪剪寒花小更垂阿瓊愁裏㺯妝遲東風燒燭夜深歸落蕊半黏叉上燕露橫斜映鬢邊犀老夫無味已多時白石道人歌曲卷二
