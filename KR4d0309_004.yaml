body:
  text: 兀勢以故得盡情騁望豫欲家焉而未得作徵招以寄興徵招角招者政和間大晟府嘗製數十曲音節駁矣豫嘗考唐田畸聲律要訣云徵與二變之調咸非流美故自古少徵調曲也徵為去母調如黃鍾之徵以黃鍾為母不用黃鍾乃諧故隋唐舊譜不用母聲琴家無媒調商調之類皆徵也亦皆具母弦而不用其說詳於豫所作琴書然黃鍾以林鍾為徵住聲於林鍾若不用黃鍾聲便自成林鍾宫矣故大晟府徵調兼母聲一句似黃鍾均一句似林鍾均所以當時有落韻之語豫嘗使人吹而聽之寄君聲於臣民事物之中清者高而亢濁者下而遺萬寶常所謂宫離而不附者是已因再三推尋唐譜并琴弦法而得其意黃鍾徵雖不用母聲亦不可多用變徵㽔賓變宫應鍾聲若不用黃鍾而用㽔賓應鍾即是林鍾宫矣餘十一均徵調倣此其法可謂善矣然無清聲只可施之琴瑟難入燕樂故燕樂闕徵調不必補可也此一曲乃豫昔所製因舊也坐客皆小冠練服或彈琴或浩歌或自酌或援筆搜句豫度此曲即念奴嬌鬲指聲也於雙調中吹之鬲指亦謂之過腔見朝無咎集凡能吹竹者便能過腔也五湖舊約問經年底事長負清景瞑入西山漸喚我一葉夷猶乘興倦網都收歸禽時度月上汀洲冷中流容與畫橈不點清鏡誰解喚起湘靈烟鬟霧鬢理哀弦鴻陳玉麈談玄歎坐客多少風流名勝暗柳蕭蕭飛星冉冉夜久知秋信鱸魚應好舊家樂事誰省嘉泰壬辰至日刻于東巖之讀書堂雲間錢希武白石道人歌曲卷四
