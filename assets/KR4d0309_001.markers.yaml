  - {type: variant, offset: 47, length: 6078, content: 謂之鼓吹軍中謂之騎吹其曲有朱鷺等二十二篇由漢逮隋承用不替雖名數不同而樂紀罔墜各以詠歌祖宗功業唐亡鐃部有栁宗元作十二篇亦棄弗錄神宋受命帝績皇烈光耀震動而逸典未舉迺政和七年臣工以請上詔製用中更否擾聲文罔傳中興文儒荐有擬述不麗于樂厥誼不昭臣今製曲辭十四首昧死以獻臣若稽前代鐃歌咸敘威武衂人之軍屠人之國以得土疆乃矜厥能惟我太祖太宗眞仁髙宗或取或守罔匪仁術討者弗戮執者弗劉仁融義安歴數彌永故臣斯文特倡盛德其辭舒和與前作異臣又惟宋因唐度古曲墜逸鼓吹所録惟存三篇譜文乖訛因事製辭曰導引曲十二時六州歌頭皆用羽調音節悲促而登封岱宗郊祀天地見廟耕耤帝后册寳發引升祔五禮殊情樂不異曲義理未究乞詔有司取臣之詩協其清濁被之簫管俾聲暢辭達感藏人心永念宋德無有紀極海内稱幸臣䕫頓首上尚書上帝命太祖受命也五季亂極人心戴宋太祖無心而得天下也上帝命惟皇皇俶作宋祚五王不綱陳橋之夕帝服自黄惟帝念民惟民念靖八紘一春不曰予聖璇題玉除龍路孔蓋得之非心遜亦云易有弟聖賢我祚萬年十世之後乃復其天河之表破澤州也李筠不知天命自慿其勇不能降心以至於叛而死也河之表曰上黨彼耽耽踞奥壤交韔百斤不如一仁撥汗千里莫能脫身帝整其旅疇曰汝武心飛太行膽落戰鼓淮海濁定維揚也李重進自謂周大臣不屈於太祖作銕劵以安之猶據鎭叛淮海濁老將戾帝心堯舜信在劵外汝胡弗思與越豨輩皇威壓之燕壘自碎維宋佐命維周碩臣汝獨狐疑用殱厥身沅之上取湖南也湖南有難乞援於我至則拒焉我師取之沅之上故王都今焉在空雲蕪勢危則嘑勢謐則叛背予德心繄爾作難東届巴邱西盡九疑蠻師委伏願還耕犂岧岧鎭山火德之紀眞人方興百神仰止皇威暢得荆州也我師救湖南道荆州髙繼冲懼歸其土皇威暢附庸讋渚宫三月春草發漢家旌旗繞城堞小臣不敢煩天威再拜敢以荆州歸帝得荆州不爲喜百萬愁鱗濯春水蜀山邃取蜀也孟昶恃其國險且結河東以拒命兵加國除蜀山䆳蜀主肆謂當萬年不亮天意帝曰全斌汝征自秦闗門不守吏啼白雲帝曰光誼汝征自峽瞿唐反波助我肆伐蜀人號呼乞生于師蜀囚素衣天子憐之時雨霈取廣南也劉鋹淫虐我師弔其民俘鋹以歸時雨霈旱火絶聖人出虐政滅五嶺之君盲風怪雲毒蛇臻臻相其不仁南兵象陳自謂孔武有獻在廟僞臣僞主降者榮之叛者生之將不若是彼死爭之十僞之夷一用此道天祐烈祖仁以易暴望鍾山下江南也李煜乍臣乍叛勢窮乃降而我師未嘗戮一人也望鍾山睇揚子波湯湯雲靡靡主歌臣謡樂未已詔書屢嘑不爲起釣絲夜緯匪魴鯉長虹西徠波可履嗚呼慿凌果何恃辯士疾馳拜前陛曰臣有罪當萬死帝曰盍歸予宥爾我師入其都矢不踐螻蟻至今鍾山雲猶帶仁義氣大哉仁吳越錢俶獻其國也大哉仁萬世輔后皇明明監于下俶若曰亶爲民封殖一姓吁不仁瞻彼日月爝火敢出震震皇皇帝命是式吏其稅租府其版圖爾豈固負俾民作俘維宋之仁中天建國呉山越濤衛我帝宅維俶之仁世世麗澤子孫來朝車馬玉帛謳歌歸陳洪進以漳泉來獻也謳歌歸兮四海一强國潰兮弱國入彼無諸兮計將安出天不震兮民不荼象齒貢兮沈水輸保室家兮長娭娯伐功繼克河東也始太祖之伐河東誓不殺一人又哀劉氏之不祀故緩取之至太宗始得其地伐功繼吁以時烈祖有造太宗濟之河東雖㣲方命再世河東雖强卒奪其帥惟漢之葉保于此都烈祖念汝乃貸未鉏一夫殘生帝也不取雨露既洽河東自舉河東既平九有以寧嗚呼太宗繼伐有聲帝臨墉親征契丹於澶淵也帝臨墉六師厲胡如雲暗九地帝曰吁胡儆予凖曰帝毋庸虞晉之謝胡宅夏驕弗懲薄兹野我謀臧我武揚帝在兹胡且亡椎虞機激流矢一酋仆萬胡靡勝不戰惟唐虞魄斯禠焚穹廬帝曰吁棄汝過粤明年使來賀維四葉美致治也維四葉聖承烈羣生熙德施浹吁嗟仁兮帝垂衣澹無爲日月出照玉墀吁嗟仁兮帝乗輅六龍儛神示下繹鐘鼓吁嗟仁兮周八區耆以醇稼如海桑如雲吁嗟仁兮炎精復歌中興也炎精復天馬度人漢思狄爲懼洛水深深漠雲陰陰維帝傷心帝心激烈將蹀胡血天地動色惟哀盡劉馳使之輈包將之矛皇基再峙有統有紀施于孫子天醻帝仁遹符夢靈遹臻太平越九歌越人好祠其神多古聖賢予依九歌爲之辭且系其聲使歌以祠之南㽔林南林黄太姑㽔姑太姑林黄太黄清清清應南央央帝旂羣冕相輿聿來我嬀我芸緑滋維湘林南黄太黄姑㽔姑太姑林黄太黄南黃清應南與楚謂狩在陼雲横九疑帝若來下我懷厥初㽔林㽔姑黄太黄姑應南林南太黄清清應南㽔林孰耕孰漁勿忘惠康疇匪帝餘博碩于爼維錯㽔姑姑太黃姑㽔林黃黄清于豆瑶灑玉離侑此桂酒右帝舜楚調林南林仲夾林南無黃林仲夾黄太黃清清清無南黃清登崇邱懷美功窋䆛在雲其𪷟享維德輯萬國無南林夾仲林仲太黄夾仲林無黃太黃清清清南無轍轇轕蹇時宅珠爲橇玉爲車報我則腆不當南林仲夾林仲太黄林仲林無南林黃太黄清清清林厥拘王斾返風偃偃山鳥呼觚棱晚豐予諶菲仲夾可薦右王禹呉調夾鍾宫黃太黄清清清南林南姑太黄南無黄清姑南太黄清清無南雲蒼涼山嶻嶭瞻靈旗闖越絶故宫凄凄生綠林姑太姑黄姑太姑林南太黄清清無南黄清太黄清清南蕪謀臣安在空五湖酹君君毋西入呉洪濤卷黃清無南林南林南黃姑太姑林南太清林黄太黃清清清地龍工呼函