  - {type: variant, offset: 0, length: 646, content: 淳熙丙午立夏余遊南嶽至雲密峯徘徊禹溪橋下上愛其幽絶即屏置僕馬獨尋溪源行且吟哦顧見茅屋蔽虧林木間若士坐大石上眉宇間爽年可四五十心知其異人即前揖之相接甚溫便邀入舍内煎苦茶共食從容問從何來適吟何語余以實告且舉似昨日望嶽小山不能雲大山半爲天之句若士喜謂余可人遂探囊出書一卷云是詩說老夫頃者常留意兹事故有此書今無作矣徑以付君余益異之然匆匆不暇觀但袖藏致謝而已問其年則慶暦間生始大驚意必得長生不老之道再三求敎笑而不言亦不道姓名再相留噉黄精粥余辭以與人偕來在官道上相候告别出至橋上馬偏詢土人無知者惟一老父嘆曰此先生久不出今猶在耶與欲語忽失所在悵然而去晚解鞍細讀其書甚偉常寘枕中時時翫味好事者有聞間來取觀亦不靳也昔軒轅彌明能詩多在南山若士豈其儔哉白石姜䕫堯章序白石道人歌曲目錄卷一聖宋鐃歌鼓吹曲十四首上帝命河之表淮海濁沅之上皇威暢蜀山邃時雨霈望鍾山大哉仁謳歌歸伐功繼帝臨墉維四葉炎精復越九歌帝舜王禹越王越相項王濤之神曹娥龎將軍旌忠蔡孝子琴曲一首古怨卷二令小重山令江梅引驀山溪鶯聲繞紅樓鬲溪梅令阮郎歸二首好事近點絳唇二首虞美人二首憶王孫少年遊鷓鴣天七首夜行船杏花天影醉吟商小品玉梅令踏莎行訴衷情浣溪紗六首卷三慢霓裳中序第一慶宫春齊天樂滿江紅一蕚紅念奴嬌二首眉嫵月下笛清波引法曲獻仙音琵琶仙玲瓏四犯側犯水龍吟探春慢八歸解連環喜遷鶯慢摸魚兒卷四自製曲揚州慢長亭怨慢淡黄柳石湖仙暗香疎影惜紅衣角招徴招秋宵吟凄涼犯翠樓吟湘月别集小重山令念奴嬌卜算子八首洞仙歌驀山溪永遇樂虞美人永遇樂水調歌頭漢宫春二首跋白石道人歌曲目錄, WYG: 各}
