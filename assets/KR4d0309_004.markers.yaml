  - {type: variant, offset: 0, length: 422, content: 兀勢以故得盡情騁望予欲家焉而未得作徵招以寄興徵招角招者政和間大晟府嘗製數十曲音節駁矣予嘗攷唐田畸聲律要訣云徵與二變之調咸非流美故自古少徵調曲也徵爲去母調如黄鍾之徵以黄鍾爲母不用黄鍾乃諧故隋唐舊譜不用母聲琴家無媒調商調之類皆徵也亦皆具母弦而不用其說詳於予所作琴書然黄鍾以林鍾爲徵住聲於林鍾若不用黄鍾聲便自成林鍾宫矣故大晟府徵調兼母聲一句似黄鍾均一句似林鍾均所以當時有落韻之語予嘗使人吹而聽之寄君聲於臣民事物之中清者高而亢濁者下而遺萬寶常所謂宫離而不附者是已因再三推尋唐譜并琴弦法而得其意黄鍾徵雖不用母聲亦不可多用變徵㽔賓變宫應鍾聲若不用黄鍾而用㽔賓應鍾即是林鍾宫矣餘十一均徵調倣此其法可謂善矣然無清聲只可施之琴瑟難入燕樂故燕樂闕徵調不必補可也此一曲乃予昔所製因舊也坐客皆小冠練服或彈琴或浩歌或自酌或援筆搜句予度此曲即念奴嬌鬲指聲也於雙調中吹之鬲指亦謂之過腔見晁無咎集凡能吹竹者便能過腔也五湖舊約問經年底事長負清景瞑入西山漸喚我一葉夷猶乘興倦網都收, WYG: ''}
