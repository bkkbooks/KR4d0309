  - {type: variant, offset: 0, length: 508, content: 白石道人歌曲别集番陽姜夔堯章小重山令趙郎中謁告迎侍太夫人將來都下予喜爲作此曲寒食飛紅滿帝城慈烏相對立柳青青玉階端笏細陳情天恩許春盡可還京鵲報倚門人安輿扶上了更親擎看花攜樂緩行程爭迎處堂下拜公卿念奴嬌毀舍後作昔遊未逺記湘臯聞瑟澧浦捐堞因覔孤山林處士來踏梅根殘雪獠女供花傖兒行酒卧看青門轍一􅏀吾老可憐情事空切曾見海作桑田仙人雲表笑汝眞癡絶說與依依王謝燕應有涼風時節越只青山吳惟芳草萬古皆沈滅繞枝三匝白頭歌盡明月卜算子吏部梅花八詠夔次韻江左詠梅人夢繞青青路因向凌風臺下看心事還將與憶别庾郎時又過林逋處萬古西湖寂寞春惆悵誰能賦又月上海雲沈鷗去吳波迴行過西泠有一枝竹暗人家靜又見水沈亭舉目悲風景花下鋪氊把一盃緩飲春風影西泠橋在孤山之西水沈亭在孤山之北亭廢又蘚幹石斜妨玉蕋松低覆日暮冥冥一見來略比年時痩涼觀酒初醒竹閣吟纔就猶恨幽香作許慳小遲春心透涼觀在孤山之麓南北梅最竒竹閣在涼觀西今廢又家在馬城西曾賦梅屏雪梅雪相兼不見花月影玲瓏徹前度帶愁看一晌和愁折若使逋仙及見之定自成愁絶馬城在都城西北梅屏甚見珍愛又摘蕋暝禽飛倚樹懸冰落下竺橋邊淺立時香已漂流却空逕晚烟平古寺春寒惡老子尋花第一番常恐吳兒覺下竺寺前磵石上風景甚妙又緑蕚更横枝多, WYG: ''}
