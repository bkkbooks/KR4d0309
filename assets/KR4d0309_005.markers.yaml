  - {type: variant, offset: 501, length: 1035, content: 梅花樣惆悵西村一塢春開過無人賞細草藉金輿歳歳長吟想枝上么禽一兩聲猶似宫娥唱緑蕚横枝皆梅别種凡二十許名西村在孤山後梅皆阜陵時所種又象筆帶香題龍笛吟春咽楊柳嬌癡未覺愁花管人離别路出古昌源石瘦冰霜潔折得青鬚碧蘚花持向人間說越之昌源古梅妙天下又御苑接湖波松下春風細雲緑峩峩玉萬枝别有仙風味長信昨來看憶共東皇醉此樹娑娑一惘然苔蘚生春意聚景官梅皆植之髙松之下花䕃嵗久萼盡緑夔舊歲觀梅於彼所聞於園官者如此末章及之洞仙歌黄木香贈辛稼軒花中慣識壓架玲瓏雪乍見緗㽔間琅葉恨春風將了染額人歸留得箇裊裊垂香帶月鵞兒眞似酒我愛幽芳還比酴醿又嬌絶自種古松根待看黄龍亂飛上蒼髯五鬛更老仙添與筆端春敢喚起桃花問誰優劣驀山溪詠柳青青官柳飛過雙雙燕樓上對春寒捲珠簾瞥然一見如今春去香絮亂因風霑徑草惹牆花一一敎誰管陽闗去也方表人腸斷幾度拂行軒念衣冠尊前易散翠眉織錦紅葉浪題詩烟渡口水亭邊長是心先亂永遇樂次韻辛克清先生我與先生夙期已久人間無此不學楊郎南山種豆十一徵㣲利雲霄直上諸公袞袞乃作道邊苦李五千言老來受用肯敎造物兒戲東岡記得同來胥宇歲月幾何難計柳老悲桓松高對阮未辦爲鄰地長干白下青樓朱閣往往夢中槐蟻却不如窪尊放滿老夫未醉虞美人括蒼烟雨樓石湖居士所造也風景似越之蓬萊閣而山勢環繞峯嶺高秀過之觀居士題顔且歌其所作虞美人夔亦作一解闌干表立蒼龍背三面攙天翠東遊纔上小蓬萊不見此樓烟雨未應回而今指點來時路却是冥𪷟處老仙鶴馭幾時歸未必山川城郭是耶非永遇樂北固樓次稼軒韻雲隔迷樓苔封很石人向何處數騎秋烟一篙寒汐千古空來去使君心在蒼厓緑嶂苦被北門留住有尊中酒差可飲大旗盡繡熊虎前身諸葛來遊此地數語便酬三顧樓外冥冥江臯隱隱認得征西路中原生聚神京耆老南望長淮金鼓問當時依依種柳至今在否水調歌頭富覽亭永嘉作日落愛山紫沙漲省潮回平生夢猶不到一葉眇西來欲訊桑田成海人世了無知者魚鳥兩相猜天外玉笙杳子晉只空臺倚闌干二三子總仙才爾歌逺遊章句雲氣入吾杯不問王郎五馬頗憶謝生雙屐處處長青苔東望赤城近吾興亦悠哉漢宫春次韻稼軒雲曰歸歟縱垂天曳曳終反衡廬揚州十年一夢俛仰差殊秦碑越殿悔舊遊作計全疎分付與高懷老尹管弦絲竹寧無知公愛山入剡若南㝷李白問訊何如年年雁飛波上愁亦闗予臨臯領客向月邊攜酒攜鱸今但借秋風一榻公歌我亦能書又次韻稼軒蓬萊閣一顧傾吳苧蘿人不見烟杳重湖當時事如對奕此亦天乎大夫仙去笑人間千古須臾有倦客扁舟夜泛猶疑水鳥相呼秦山對樓自緑怕越王故壘時下樵蘇只今倚䦨一笑然則非與小叢解唱倩松風爲我吹竽更坐待千巖月落城頭眇眇啼烏白石道人歌曲別集, WYG: ''}
