  - {type: variant, offset: 4116, length: 0, content: '', WYG: 白石道人詩集卷下白石道人集外詩宋姜䕫撰燈詞見武林舊事南陌東城盡舞兒畫金刺繡滿羅衣也知愛惜春逰夜舞落銀蟾不肯歸燈已䦨珊月氣寒舞兒往往夜深還只因不盡婆娑意更向階心弄影看沙河雲合無行處惆悵來逰路已迷却入静坊燈火空門門相似列蛾眉逰人歸後天街静坊陌人家未閉門簾裏垂燈照尊俎坐中嬉笑覺春温春詞見武林舊事六軍文武浩如雲花簇頭冠様様新惟有至尊渾不戴盡将春色賜羣臣萬數簪花滿御街聖人先自景靈回不知後面花多少但見紅雲冉冉來同朴翁過浄林廣福院見咸淳臨安志四人松下共盤桓筆硯花壺石上安今日興懐同此味老仙留字在孱顔嘉泰壬戌上元日訪全老扵浄林廣福院觀沈傅師碑隆茂宗畫贈詩見咸淳臨安志深衣跨羸驂杳杳春山路入寺君未知閒看移桂樹沈碑含秀潤隆畫出神竒道人那得此老子乃躭之龍井見咸淳臨安志年時六月海揚塵遥見青山起白雲聞有髙僧來誦咒巖前抛珓問龍君自題畫像見硯北雜志鶴氅如烟羽扇風寄情芳草緑隂中黒頭辦了人間事來看凌霜數㸃紅句小山不能雲大山半為天見歸田詩話屋角紅梅樹花前白石生見愛日齋叢鈔附録諸賢酬贈詩進退格寄張功甫姜堯章楊萬里廷秀尤蕭范陸四詩翁此後誰當第一功新拜南湖為上将更推白石作先鋒可憐公等俱癡絶不見詞人到老窮謝遣管城儂已晚酒泉端欲乞移封題堯章新成草堂周文璞晉仙早将心事付漁樵若被幽人苦見招多種竹将挑筍喫旋栽松待斫柴燒壁間古畫身都碎架上枯琴尾半焦猶有住山窮活計仙經盈卷一村瓢姜堯章金塗佛塔歌又白石招我入書齋使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相飢鷹餓虎紛相向拈起靈山受記時龍天帝釋應惆悵形模逺自流沙至鑄出今回更精緻錢王納土歸京師流落多在西湖寺錢王本是英雄人白蓮花現國主身蛇鄉虎落狗脚朕何如紅袍玉帶稱功臣天封坼開即退聴兩浙不聞笳鼓競歸來佛子作護持太師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地罏山芋羮何曽薫陸綺牀供但見相輪銅緑明哦詩禮塔猶未畢蘆葉低飛山雨濕弔堯章又相逢蕭寺已纍然自詠離騷講太𤣥極目舊逰惟白石傷心孤塜只蒼烟兒從外舍收殘稿客向空山泣斷絃帝所修文與張樂魂兮應是到鈞天和堯章九日送菊二首王炎晦叔對花懶舉玉東西孤負金錢滿緑枝短髩不堪重落帽枯腸何可强捜詩花品若将人品較此花風味似吾儒秋英餐罷含清思曽有離騷續筆無題堯章舊逰詩巻又出郭栽花渉小園歸調琴譜輯詩編少年豪健今揫斂休羡騎鯨李謫仙臘中得雪快晴成古風呈堯章銛老又蒼頭熟睡喚不應光射紙窗疑月明更籌可數夜方半杙上一雞先誤鳴暁起飛花堆戸外幻出人間無色界九街車馬不知寒蹴蹋銀杯翻縞帶杲杲日升東海東須臾光彩蒸霞紅不憂桂玉頓増價人在冲融和氣中貝闕珠宫五雲際遥知天上龍顔喜麥畦白白覆青青農事年來定豐美清明日訪白石不值葛天民無懐花薺懸燈栁拂簷老懐那得似餳甜畫船已載先生去燕子無人自入簾重訪白石又長安惟白石與我最相關每到難逢面翻思懶下山欲歸愁路永小住待君還盡日看幽桂無人似我閒六月一日與堯章泛湖又六月西湖帶雨山小舟終日傍鷗閒風烟如許闗情甚賓主相推下語難幾㸃送君歸大雅一涼今夜滿長安江湖逺思知多少歸去風前各倚䦨}
