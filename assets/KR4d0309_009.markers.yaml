  - {type: line-break, offset: 0, content: '', id: KR4d0309_SBCK_009-1a01}
  - {type: variant, offset: 0, length: 1368, content: 白石道人詩集卷下番陽姜䕫堯章五言律詩題華亭錢參園池花裏藏仙宅簾邊駐客舟浦涵滄海潤雲接洞庭秋草木山山秀闌干處處幽機雲韜世業暇日此夷猶同朴翁登卧龍山龍尾回平野簷牙出翠㣲望山憐緑逺坐樹覺春歸草合平呉路鷗忘霸越機午涼松影亂白羽對禪衣坐上和約齋句入冰輪冷愁因玉宇開可無如此客猶恨不能杯好句長城立寒鴉結陣來箜篌莫停手拚却斷腸回出北關呉兒臨水宅四面見行舟蒲葉侵鵞項楊枝蘸馬頭年年人去國夜夜月窺樓傳語城中客功名半是愁答沈器之二首江漢乗流客乾坤不繫舟玉琴虚素月金劍落清秋野鹿知隨草飢鷹故上鞲風流大隄曲一唱使人愁渉逺身良苦登髙望欲迷試吟青玉案不是白銅鞮露下秋蟲怨風髙北馬嘶槎頭有新味人在太湖西悼石湖三首身退詩仍健官髙病已侵江山平日眼花鳥暮年心九轉終無助三髙竟欲尋尚留巾墊角胡虜有知音未作龍蛇夢驚聞露電身百年無此老千首屬何人安得公長健那知事轉新酸風憂國淚髙塚卧麒麟未定情鍾痛何堪更悼亡遺書知伏枕來弔只空堂雪裏評詩句梅邊按樂章沈思酒杯落天濶意一作正茫茫七言律詩送朝天續集歸誠齋時在金陵翰墨場中老斲輪眞能一筆掃千軍年年花月無閑日處處山川怕見君箭在的中非爾力風行水上自成文先生只可三千首回施江東日暮雲寄上張參政姑蘇臺下梅花樹應爲調羮故早開燕寢休誇香霧重鴛行却望衮衣來前時甲第仍垂栁今度沙隄已種槐應念無枝夜飛鵲月寒風勁羽毛摧京口留别張思順伯勞飛燕若爲忙還憶東齋夜共牀别後無書非棄我春前會面却他鄉連宵爲說經憂患異日相逢各老蒼更欲少留天不許曉風吹艇入垂楊次朴翁遊蘭亭韵亞字橋亭面面風六人同坐樹陰中松交歸路如留客石礙流杯故惱公山色最憐秦望緑野花只作晉時紅夕陽啼鳥人將散俯仰興懷自昔同右軍祠堂有杜䳌花兩株極照灼次韵胡仲方因楊伯子見寄此去廬陵定幾程向來卬杖未經行懸知征棹雲邊集大有吟情雪裏生楚渡食萍應甚美舜祠吹玉直能清二君即日青冥上惟我春山帶雨耕仲方得萍鄉宰伯子得營道倅賀張肖翁參政太乙圖書客屢談已知上相出淮南銀臺日月非虚過金鼎功名得細參從此與人爲雨露應憐有客卧雲嵐明朝起爲蒼生賀旋著藤冠紫竹簪陳君玉以小集見歸用余還誠齋朝天續集韻作七字䕫報貺筆陣無功汗左輪而今老去不能軍水邊白鳥閑於我窗外梅花疑是君欲向江湖行此語可無朋友託斯文新篇大是相料理因憶西山揚子雲寄田郎楚楚田郎亦大竒少年風味我曾知春城寒食誰相伴夜月梨花有所思剪燭屢呼金鑿落倚窗閒品玉參差含情不擬逢人說鸚鵡能歌自作詞送王德和提舉淮東京塵吹帽汗淋衣相見頻年只道歸省裏移文那得了家邊持節未爲非煮乾碧海知誰用割盡黄雲尚告飢可得不爲根本計秋風還見鴈南飛寄時父遲君日日數歸程到得君歸我已行一路好山思共看半年有酒不同傾吾儕正坐清貧累各自而今白髪生人物渺然須强飯天工應不負才名送李萬頃猛相思裏得君來正喜歡時却便回别路恐無青栁折到家應有小桃開起居五馬兼堂上問信千巖及阿灰張禕姓張曙小字阿灰兒女癡頑夫婦健漂零何日共尊罍次韵千巖雜謡中散平生七不堪鳳塵時時伴燕談道士有神傳火棗故人無字入雲藍雨涼竹葉宜三酌日落荷花倚半酣極欲扁舟南蕩去冷鷗輕燕略相諳寄上鄭郎中梅根東望九華雲中有風流衣繡人名下一生勞夢想尊前數語倍情親節旄在道催歸漢花鳥留君且作春見說祥風挾時雨故園松菊亦精神送左眞州還長沙呉兒牽挽醉蓴鱸今日西歸略自如别路冷雲隨驛馬望鄉喬木記吾廬湘中花月偏憐酒淮左兒童待擁車凡我舊遊君更歴橘洲相見訝無書乍涼寄朴翁前日松間歩屧歸更將荷葉障秋暉如今城裏抛, WYG: ''}
