  - {type: variant, offset: 0, length: 74, content: 白石道人詩說大凡詩自有氣象體面血脉韵度氣象欲其渾厚其失也俗體面欲其宏大其失也狂血脈欲其貫穿其失也露韵度欲其飄逸其失也輕作大篇尤當布置首尾匀停腰腹肥滿, WYG: ''}
  - {type: 'kr:newline', offset: 6, content: '

