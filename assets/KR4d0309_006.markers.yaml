  - {type: variant, offset: 75, length: 1047, content: 見人前面有餘後面不足前面極工後面草草不可不知也詩之不工只是不精思耳不思而作雖多亦奚爲雕刻傷氣敷衍露骨若鄙而不精巧是不雕刻之過拙而無委曲是不敷演之過人所易言我寡言之人所難言我易言之自不俗花必用柳對是兒曹語若其不切亦病也難說處一語而盡易說處莫便放過僻事實用熟事虚用說理要簡切說事要圎活說景要㣲妙多看自知多作自好矣小詩精深短章醖藉大篇有開闔乃妙喜辭銳怒辭戾哀辭傷樂辭荒愛辭結惡辭絶欲辭屑樂而不淫哀而不傷其惟闗雎乎學有餘而約以用之善用事者也意有餘而約以盡之善措辭者也乍敘事而間以理言得活法者也不知詩病何由能詩不觀詩法何由知病名家者各有一病大醇小疵差可耳篇終出人意表或反終篇之意皆妙守法度曰詩載始末曰引體如行書曰行放情曰歌兼之曰歌行悲如蛩螿曰吟通乎俚俗曰謡委曲盡情曰曲詩有出于風者出于雅者出于頌者屈宋之文風出也韓柳之詩雅出也杜子美獨能兼之三百篇美刺箴怨皆無跡當以心會心陶淵明天資既高趣詣又逺故其詩散而莊澹而腴斷不容作邯鄲歩也語貴含蓄東坡云言有盡而意無窮者天下之至言也山谷尤謹于此清廟之瑟一唱三嘆逺矣哉後之學詩者可不務乎若句中無餘字篇中無長語非善之善者也句中有餘味篇中有餘意善之善者也體物不欲寒乞意中有景景中有意思有窒礙涵養未至也當益以學歲寒知松柏難處見作者波瀾開闔如在江湖中一波未平一波已作如兵家之陣方以爲正又復是竒方以爲竒忽復是正出入變化不可紀極而法度不可亂文以文而工不以文而妙然捨文無妙聖處要自悟意出于格先得格也格出于意先得意也吟咏情性如印印泥止乎禮義貴涵養也沈著痛快天也自然與學到其爲天一也意格欲高句法欲響只求工于句字亦末矣故始于意格成于句字句意欲深欲逺句調欲清欲古欲和是爲作者詩有四種高妙一曰理高妙二曰意高妙三曰想高妙四曰自然高妙礙而實通曰理高妙出事意外曰意高妙寫出幽㣲如清潭見底曰想高妙非竒非怪剝落文采知其妙而不知其所以妙曰自然高妙一篇全在尾句如截犇馬辭意俱盡如臨水送將歸辭盡意不盡若夫辭盡意不盡剡溪歸櫂是已辭意俱不盡溫伯雪子是已所謂辭意俱盡者急流中截後語非謂辭窮理盡者也所謂意盡辭不盡者意盡于未當盡處則辭可以不盡矣非以長語益之者也至如辭盡意不盡者非遺意也辭中已彷彿可見矣辭意俱不盡者不盡之中固已深盡之矣一家之語自有一家之風味如樂之二十四調各有韵聲乃是歸宿處模倣者語雖似之韵亦無矣雞林其可欺哉詩說之作非爲能詩者作也爲不能詩者作而使之能詩能詩而後能盡吾之說是亦爲能詩者作也雖然以吾之說爲盡而不造乎自得是足以爲能詩哉後之賢者有如以水投水者乎有如得兎忘筌者乎噫吾之說已得罪于古之詩人後之人其勿重罪余乎, WYG: ''}
