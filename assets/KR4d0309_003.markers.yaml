  - {type: variant, offset: 0, length: 214, content: 白石道人歌曲卷三番陽姜夔堯章慢霓裳中序第一丙午歲留長沙登祝融因得其祠神之曲曰黄帝鹽蘇合香又於樂工故書中得商調霓裳曲十八闋皆虚譜無辭按沈氏樂律霓裳道調此乃商調樂天詩云散序六闋此特兩闋未知孰是然音節閑雅不類今曲予不暇盡作作中序一闋傳於世予方覊遊感此古音不自吟因賦此闋葢過旬塗藁乃定朴翁咎予無益然意所耽不能自已也平甫商卿朴翁皆工於詩所出竒詭予亦强追逐之此行既歸各得五十餘解雙槳蓴波一蓑松雨暮愁漸滿空闊呼我盟鷗翩翩欲下背人還過木末那回歸, WYG: ''}
