  - {type: line-break, offset: 0, content: '', id: KR4d0309_SBCK_007-1a01}
  - {type: variant, offset: 0, length: 951, content: 白石道人詩集目錄卷上五言古詩以長歌意無極好爲老夫聽爲韵奉别沔鄂親友赤松圖虞美人草華藏寺雲海亭望具區夏日寄朴翁朴翁時在靈隱春日書懷四首箜篌引待千巖古樂府雪中訪石湖范成大和詩附賦千巖曲水李陵臺呈徐通仲兼簡仲錫通仲與誠齋爲鄉人近來赴調而誠齋去國又通仲久與千巖有苕霅之約而未至余挽通仲欲與同歸千巖故末章及之和轉庵丹桂韵昔遊詩潘檉韓淲書後詩附七言古詩送王孟玉歸山陰烏夜啼余居苕溪上與白石洞天爲鄰潘徳久字予曰白石道人且以詩見卑其辤曰人間官爵似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼予以長句報貺丁巳七月望湖上書事送陳敬甫生雲軒送項平甫倅池陽書乞米帖後契丹歌禽言如曰哥哥次韵誠齋送僕往見石湖長句楊萬里原作附卷下五言律詩題華亭錢參園池同朴翁登卧龍山坐上和約齋出北闗答沈器之二首悼石湖三首七言律詩送朝天續集歸誠齋時在金陵寄上張參政京口留别張思順次朴翁遊蘭亭韵次韵胡仲方因楊伯子見寄賀張肖翁參政陳君玉以小集見歸用余還誠齋朝天續集韵作七字夔報貺寄田郎送王德和提舉淮東寄時甫送李萬頃次韵千巖雜謠寄上鄭郎中送左眞州還長沙乍涼寄朴翁張平甫哀挽五言絶句同潘德久作明妃詩東堂聮句與和甫時甫分題畫卷䕫得剡溪圖六言絶句金神夜獵圖二首次韵鴛鴦梅二首馬上值牧兒七言絶句過湘陰寄千巖雁圖除夜自石湖歸苕溪臨安旅邸答蘇虞叟姑蘇懷古次韵德久次石湖書扇韵竹友爲徐南卿作壽朴翁湖上寓居雜咏平甫見招不欲往三高祠過桐廬登烏石寺觀張魏公劉安成岳武穆留題劉云侍兒意眞奉命題記過垂虹訪費山人牛渚武康丞宅同朴翁詠牽牛朴公悼牽牛甚竒余亦作過德清項里雪中六解越中士女春遊送范仲訥往合肥三首下孤城平甫放三十六鷗於呉松余不及與盟蕭山戊午春帖子偶題陳日華侍兒讀書女郎山釣雪亭緑蕚梅次韵武伯觀燈口號十首陪張平甫遊禹廟寄俞子二首集外詩燈詞春詞同朴翁過淨林廣福院嘉泰壬戌上元日訪全老於淨林廣福院觀沈傅師碑隆茂宗畫贈詩龍井自題畫像句附錄諸賢酬贈詩進退格寄張功甫姜堯章楊萬里題堯章新成草堂周文璞姜堯章金塗佛塔歌又弔堯章又和堯章九日送菊二首王炎題堯章舊遊詩卷又臘中得雪快晴成古風呈堯章銛老又清明日訪白石不值葛天民重訪白石又六月一日與堯章泛湖又附錄𥙷遺詩詞次姜堯章贈詩卷中韻五首陳造次堯章餞南卿韻二首又三部樂呉文英三姝媚又解連環又拜星月慢又齊天樂又惜紅衣又暗香疎影吳潜白石道人詩集目錄, WYG: 撰}
