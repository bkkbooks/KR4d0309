front:
  text: 淳熙丙午立夏余遊南嶽至雲密峯徘徊禹溪橋下上愛其幽絶即屏置僕馬獨尋溪源行且吟哦顧見茅屋蔽虧林木間若士坐大石上眉宇間爽年可四五十心知其異人即前揖之相接甚溫便邀入舍內煎苦茶共食從容問從何來適吟何語余以實告且舉似昨日望嶽小山不能雲大山半為天之句若士喜謂余可人遂探囊出書一卷云是詩說老夫頃者常留意兹事故有此書今無作矣徑以付君余益異之然匆匆不暇觀但袖藏致謝而已問其年則慶曆間生始大驚意必得長生不老之道再三求教笑而不言亦不道姓名再相留噉黃精粥余辭以與人偕來在官道上相候告别出至橋上馬偏詢土人無知者惟一老父嘆曰此先生久不出今猶在耶與欲語忽失所在悵然而去晚解鞍細讀其書甚偉常置枕中時時玩味好事者有聞間來取觀亦不靳也昔軒轅彌明能詩多在南山若士豈其儔哉白石姜䕫堯章序白石道人歌曲目録
