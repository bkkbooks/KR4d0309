front:
  text: 白石道人歌曲别集
  hash: sha256:5d43e41a131cec6addef82f020428fb7bc9310e11dbd515898b1fc77da14c7c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0309_SBCK_005-1a}
body:
  text: 番陽姜夔堯章小重山令趙郎中謁告迎侍太夫人將來都下豫喜為作此曲寒食飛紅滿帝城慈烏相對立柳青青玉階端笏細陳情天恩許春盡可還京鵲報倚門人安輿扶上了更親擎看花攜樂緩行程爭迎處堂下拜公卿念奴嬌毀舍後作昔遊未逺記湘臯聞瑟澧浦捐堞因覔孤山林處士來踏梅根殘雪獠女供花傖兒行酒卧看青門轍一􅏀吾老可憐情事空切曾見海作桑田仙人雲表笑汝真癡絶說與依依王謝燕應有涼風時節越只青山吳惟芳草萬古皆沈滅繞枝三匝白頭歌盡明月卜算子吏部梅花八詠夔次韻江左詠梅人夢繞青青路因向凌風臺下看心事還將與憶别庾郎時又過林逋處萬古西湖寂寞春惆悵誰能賦又月上海雲沈鷗去吳波回行過西泠有一枝竹暗人家靜又見水沈亭舉目悲風景花下鋪氊把一杯緩飲春風影西泠橋在孤山之西水沈亭在孤山之北亭廢又蘚幹石斜妨玉蕊松低覆日暮冥冥一見來略比年時瘦涼觀酒初醒竹閣吟才就猶恨幽香作許慳小遲春心透涼觀在孤山之麓南北梅最竒竹閣在涼觀西今廢又家在馬城西曾賦梅屏雪梅雪相兼不見花月影玲瓏徹前度帶愁看一晌和愁折若使逋仙及見之定自成愁絶馬城在都城西北梅屏甚見珍愛又摘蕊暝禽飛倚樹懸冰落下竺橋邊淺立時香已漂流却空徑晚烟平古寺春寒惡老子尋花第一番常恐吳兒覺下竺寺前澗石上風景甚妙又緑蕚更橫枝多少梅花樣惆悵西村一塢春開過無人賞細草藉金輿歲歲長吟想枝上么禽一兩聲猶似宫娥唱緑蕚橫枝皆梅别種凡二十許名西村在孤山後梅皆阜陵時所種又象筆帶香題龍笛吟春咽楊柳嬌癡未覺愁花管人離别路出古昌源石瘦冰霜潔折得青鬚碧蘚花持向人間說越之昌源古梅妙天下又御苑接湖波松下春風細雲緑峩峩玉萬枝别有仙風味長信昨來看憶共東皇醉此樹娑娑一惘然苔蘚生春意聚景官梅皆植之髙松之下花䕃嵗久萼盡緑夔舊歲觀梅於彼所聞於園官者如此末章及之洞仙歌黃木香贈辛稼軒花中慣識壓架玲瓏雪乍見緗㽔間琅葉恨春風將了染額人歸留得箇裊裊垂香帶月鵝兒真似酒我愛幽芳還比酴醿又嬌絶自種古松根待看黃龍亂飛上蒼髯五鬛更老仙添與筆端春敢喚起桃花問誰優劣驀山溪詠柳青青官柳飛過雙雙燕樓上對春寒捲珠簾瞥然一見如今春去香絮亂因風霑徑草惹牆花一一教誰管陽關去也方表人腸斷幾度拂行軒念衣冠尊前易散翠眉織錦紅葉浪題詩烟渡口水亭邊長是心先亂永遇樂次韻辛克清先生我與先生夙期已久人間無此不學楊郎南山種豆十一徵微利雲霄直上諸公袞袞乃作道邊苦李五千言老來受用肯教造物兒戲東岡記得同來胥宇歲月幾何難計柳老悲桓松高對阮未辦為鄰地長干白下青樓朱閣往往夢中槐蟻却不如窪尊放滿老夫未醉虞美人括蒼烟雨樓石湖居士所造也風景似越之蓬萊閣而山勢環繞峯嶺高秀過之觀居士題顔且歌其所作虞美人夔亦作一解闌干表立蒼龍背三面攙天翠東遊才上小蓬萊不見此樓烟雨未應回而今指點來時路却是冥𪷟處老仙鶴馭幾時歸未必山川城郭是耶非永遇樂北固樓次稼軒韻雲隔迷樓苔封很石人向何處數騎秋烟一篙寒汐千古空來去使君心在蒼崖緑嶂苦被北門留住有尊中酒差可飲大旗盡繡熊虎前身諸葛來遊此地數語便酬三顧樓外冥冥江臯隱隱認得征西路中原生聚神京耆老南望長淮金鼓問當時依依種柳至今在否水調歌頭富覽亭永嘉作日落愛山紫沙漲省潮回平生夢猶不到一葉眇西來欲訊桑田成海人世了無知者魚鳥兩相猜天外玉笙杳子晉只空臺倚闌干二三子總仙才爾歌逺遊章句雲氣入吾杯不問王郎五馬頗憶謝生雙屐處處長青苔東望赤城近吾興亦悠哉漢宫春次韻稼軒雲曰歸歟縱垂天曳曳終反衡廬揚州十年一夢俯仰差殊秦碑越殿悔舊遊作計全疏分付與高懷老尹管弦絲竹寧無知公愛山入剡若南尋李白問訊何如年年雁飛波上愁亦關豫臨臯領客向月邊攜酒攜鱸今但借秋風一榻公歌我亦能書又次韻稼軒蓬萊閣一顧傾吳苧蘿人不見烟杳重湖當時事如對奕此亦天乎大夫仙去笑人間千古須臾有倦客扁舟夜泛猶疑水鳥相呼秦山對樓自緑怕越王故壘時下樵蘇只今倚䦨一笑然則非與小叢解唱倩松風為我吹竽更坐待千巖月落城頭眇眇啼烏白石道人歌曲別集
