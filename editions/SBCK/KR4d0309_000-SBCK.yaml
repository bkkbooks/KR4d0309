body:
  text: 卷一聖宋鐃歌鼓吹曲十四首上帝命河之表淮海濁沅之上皇威暢蜀山􅃉時雨霈望鍾山大哉仁謳歌歸伐功繼帝臨墉維四葉炎精復越九歌帝舜王禹越王越相項王濤之神曹娥龎將軍旌忠蔡孝子琴曲一首古怨卷二令小重山令江梅引驀山溪鶯聲繞紅樓鬲溪梅令阮郎歸二首好事近點絳唇二首虞美人二首憶王孫少年遊鷓鴣天七首夜行船杏花天影醉吟商小品玉梅令􅂿莎行訴衷情浣溪紗六首卷三慢霓裳中序第一慶宫春齊天樂滿江紅一蕚紅念奴嬌二首眉嫵月下笛清波引法曲獻仙音琵琶仙玲瓏四犯側犯水龍吟探春慢八歸解連環喜遷鶯慢摸魚兒卷四自製曲揚州慢長亭怨慢淡黄柳石湖仙暗香疎影惜紅衣角招徴招秋宵吟凄涼犯翠樓吟湘月别集小重山令念奴嬌卜􅈫子八首洞仙歌驀山溪永遇樂虞美人永遇樂水調歌頭漢宫春二首跋白石道人歌曲目錄
