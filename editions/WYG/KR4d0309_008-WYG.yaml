body:
  text: 五言古詩以長歌意無極好為老夫聴為韵奉别沔鄂親友滔滔沔鄂留有靦三宿桑持鉢了白日事賤丸蛣蜣念當去石友烟席凌江湘為君試歌商歌短意則長佳人魯山下謂楊大昌正之日弄清漢波促絃調寳瑟哀思感人多咬哇秦缶擊冷落郢客歌知音良不易如此粲者何英英白龍孫鄭仁舉次臯眉目古人氣拮据營數椽下簾草生砌文章作逕庭功用見造次無庸垂罄嗟遺安鹿門意詩人辛國士辛泌克清句法似阿駒别墅滄浪曲緑隂禽鳥呼頗參金粟眼漸造文字無兒輩例學語屋壁祝蒲盧山隂千載人揮灑照八極只今定武刻猶帶龍虎筆單侯出機杼單煒炳文豈是劍舞得餘波入竹石絶歎咄咄逼異時之罘君在湼守白顥黄鍾欠牛鐸淋漓弔遺稿有子殊可人蔡迨堅吾子字武伯特未見此老客來請論文但道曲肱好中郎遊千霜曲髙復誰為龎翁趣無絃鄭伯功斲鼻春風桃花溪寒渌繞蒼翠何當從兩君放浪計幽事宦達羞故妻貧賤厭丘嫂上書雲雨迥還舍筍蕨老江臯鉏帶經決計恨不早士無五羖皮没世抱枯槁伐木響虚牝吾願友褐夫九關呀虎豹何時内髙袪黄鵠眇雲樹鸚鵡澹烟蕪倚杖得清賞洗心觀本初孤鴻度關山風霜催翅翎影低白雲暮哀噭那忍聴士生有如此儲粟不滿瓶著書窮愁濱可續離騷經赤松圖山東隆凖公未語心已解按劍堂下人成事汝應退非無帶礪約政爾有恩害平生三寸舌松間潄寒瀨虞美人草夜䦨浩歌起玉帳生悲風江東可千里棄妾蓬蒿中化石那解語作草猶可舞陌上望騅來翻愁不相顧華藏寺雲海亭望具區寺為張循王功徳院茫茫復茫茫中有山蒼蒼大哉夫差國坐占天一方夫差醉蓮宫巨浪摇不醒越師何從來奪我玉萬頃年年亭上秋一笛千古愁誰能知許事飛下雙白鷗夏日寄朴翁朴翁時在靈隠風吹松樹枝懐我松間友雲從北山來令我屢回首山雲夜夜起山雨侵人衣遥知竹窗裏自吟新雨詩春日書懐四首九真何蒼蒼乃在清漢尾衡茅依草木念逺獨伯姊春來衆芳滋春去衆芳萎兄弟各天涯啼鴂見料理漢江出巨魚風雷入驅使安得挾我輈西征二千里春雲驛路暗遊子眇歸程永懐故山下風雨悲柏庭翁仲不解語幽鳥時時鳴人家插垂柳客裏又清明垂楊大别寺春草郎官湖家巷有石友合并不待呼瘦藤倚花樹花片藉玉壺老鄭談絶妙辛楊句敷腴平生子姚子貌古心甚儒時邀野僧語間與琴工俱酒䦨興未了左轉城南隅大江圍楚碧烟水入元虛流落不自恨惟嗟故人疎一月三見夢夢中相與娱日日潮風起悵望武昌魚武昌十萬家落日紫烟低亭亭頭陀塔髙處白鳥棲白鳥忽飛去春山空四圍南樓有佳人再召且再辭閉門課文事攖物深天機斯人不可致白鳥會來歸箜篌引箜篌且勿彈老夫不可聴河邉風浪起亦作箜篌聲古人抱恨死今人抱恨生南鄰賣妻者秋夜難為情長安買歌舞半是良家婦主人雖愛憐賤妾那久住緣貧來賣身不緣觸夫怒日日登髙樓悵望宫南樹待千巖褰裳望洞庭眼過天一角初别未甚愁别久今始覺作箋非無筆寒雁不肯落蘆花待挐音怪底北風惡若人金石心試命洞庭浪傳聞下巴陵瀝酒喜無恙我行丹楓林屢騁白蘋望烏鵲不可嗔論功當坐上古樂府裁衣贈所歡曲領再三安歡出無人試閨中自著看甚欲逐郎行畏人笑無媒日日東風起西家桃李開令我歌一曲曲終郎見留萬一不當意翻作平生羞雪中訪石湖雪􆅝如玉城偏師敢輕犯黄蘆陣野鶩我自将十萬三戰渠未降北面石湖范先生霸越手定自一笑粲次韻堯章雪中見贈范成大致能玉龍陣長空臯比忽先犯鱗甲塞天飛戰退三百萬當時訪戴舟却訪一寒范新詩如美人蓬蓽愧三粲賦千巖曲水紅雨灑溪流下瀨仍小駐魚隊獵殘香故故作吞吐老子把一盞微風忽吹去李陵臺李陵歸不得髙築望郷臺長安一萬里鴻雁隔年回望望雖不見時時一上來呈徐通仲兼簡仲錫通仲與誠齋為鄉人近來赴調而誠齋去國又通仲久與千巖有苕霅之約而未至余挽通仲欲與同歸千巖故末章及之斯文凖乾坤作者難屈指我從李郭遊知有徐孺子春風橘洲前白月太湖尾懐哉來無期玉唾炯在紙去年識仲氏何啻空谷喜合并忽自天顛倒見底裏維君天下士竹箭東南美胡不在石渠諸公當料理千巖今林宗泉石助風軌示疾不下堂有句髙八米此老筆硯交誠齋古元禮毫端灑秋露去國詞愈偉屬聞都門别回首即桑梓獨憐苕溪上垂榻俟行李烟波肯尋盟歸櫂為君艤和轉庵丹桂韻野人復何知自謂山澤好來裨奉常議識笳鼓羽葆誰憐老垂垂却入閙浩浩營巢猶是寓學圃何不早淮桂手所植漢甕躬自抱花開不忍出花落不忍掃佳客夜深來清尊月中倒一禪兩居士更約踐幽討昔遊詩䕫蚤嵗孤貧奔走川陸數年以來始獲寧處秋日無謂追述舊逰可喜可愕者吟為五字古句時欲展閱自省生平不足以為詩也洞庭八百里玉盤盛水銀長虹忽照影大哉五色輪我舟度其中晃晃驚我神朝發黄陵祠暮至赤沙曲借問此何處滄灣三十六青蘆望不盡明月耿如燭灣灣無人家只就蘆邉宿放舟龍陽縣洞庭包五河澧沅澬湘大江洶洶不得道茫茫将奈何篙師請小泊石矴沈泥沙是中大無岸强指葦與莎滯留三四晨大浪山嵯峩同舟總下淚自謂餧黿鼉白水日以長僅存青草芽轉眄又已没但見千頃波此時羨白鳥飛入青山阿九山如馬首一一奔洞庭小舟過其下幸哉波浪平大風忽怒起我舟如葉輕或升千丈坡或落千丈坑回望九馬山政與大浪争如飛鵞車礟亂打雎陽城又如白獅子山下跳鬇鬡須臾入别浦萬死得一生始知茵席濕盡覆杯中羮鬇鬡一作狰獰蕭蕭湘隂縣寂寂黄陵祠喬木䕃樓殿畫壁半傾攲蘆洲雨中淡漁網烟外歸重華不可見但見江鷗飛假令無恨事過此亦依依我乘五板船将入沌河口大江風浪起夜黒不見手同行子周子渠膽大如斗長竿插蘆席船作野馬走不知何所詣生死付之偶忽聞入草聲燈火亦稍有划船遂登岸亟買野家酒天寒白馬渡漢川縣界落日山陽村是時無霜雪萬里風奔奔外旃吹已透内纊冰不温吹馬馬欲倒吹笠任飛翻不見行路人但見草木蕃忽看野焼起大燄焼乾坤聲如震雷震勢若江湖吞虎豹走散亂麋鹿不足言夜投野店宿無壁亦無門此行值三厄幸得軀命存明發見老姊斗酒為招魂揚舲下大江日日風雨雪留滯鼇背洲十日不得發岸冰一尺厚刀劍觸舟楫岸雪一丈深屹如玉城堞同舟二三士頗壮不恐懾䝉氊閉篷卧波裏任傾側晨興視氊上積雪何皎潔欲上不得梯欲留岸頻裂扳援始得上幸有人見接荒村兩三家寒苦衣食缺買豬祭波神入市路已絶如今得安坐閒對妻兒說青草長沙境洞庭渺相連洞庭西北角雲夢更無邉後有白湖沌渺莽里數千豈惟大盗窟神龍所盤旋白湖辛已嵗忽墮死蜿蜒一鱗大如箕一髥大如椽白身青鬐鬛兩角上捎天半體卧沙上半體猶沈淵里正聞之官官使吏致䖍作齋為禳祓觀者足闐闐斂席覆其體數里聞腥羶一夕雷雨過此物忽已遷遺跡陷成川中可行大船是年完顔至送死江之壖或云祖龍䜟詭異非偶然近日山陽人采菱不知還望見三龍浮目若電火然見龍多見尾少見四體全一龍已為異三者亦罕傳又因漁湖側水中忽生烟烟中一驢出繞身歩蹁蹮俄隨霹靂去欲語無由緣我聞語此事乘舟往觀焉徑往枯葭浦白鷺争相先湖有劉備廟實司浩渺權徘徊無所見歸櫂月明前昔逰桃源山先次白馬渡桃源縣界渡頭何清深鴻鵠在髙樹白馬亦洞天昔人有竒遇洞門不可見但聞水聲怒瞻彼羽人宅乃乘方船渡修廊夾五殿重閣映千樹規模象魏壮回合緑隂護山椒望五溪壺頭入指顧故宫在其北屋瓦帶松霧古杉晉時物中空野人住外圍四十尺内可十客聚我逰瞿仙館壇上表遺歩却下八疊坡一亭衆妙具兩山抱澄潭老木枝榦互瞻前秀而迥坐久凛難駐桃源獨不見僻在宫南路山行轉深邃狙猿紛上下石竇出微涓令我意猶豫昔聞漁舟子水際見洞户今看去溪逺定自後人誤惆悵却歸來此遊不得屢於今二十年歴歴經行處昔遊衡山下看水入朱陵半空掃積雪萬萬玉花凝或如生綃挂或如薄霧横紛紛虎豹吼往往蛟龍驚人語不相聞濺雹漂風纓有魚緣峭壁上上終不停此中有神物雷雨周八紘昔逰衡山上未暁入幽谷欲識所坐輿横板挂兩竹状如秋千垂髙下不傾覆登山九千丈中道多佛屋一峯髙一峯峯峯秀林木仰看同來客木末見冠服髙臺石橋路尋常雲所宿下方雷雨時此上自晴旭紫葢何突兀萬里在一目餘峯六七十僅如翠浪矗北有嬾瓚巖大石庇樵牧下窺半厓花杯盂琢紅玉飛雲身畔遇攬之不盈掬祝融最髙絶紫葢不足録俯視同仰觀蒼蒼萬形伏惟餘岣嶁峯南睇半空緑髣髴認瀟湘向嶽流屈曲髙處驚我魂翻思宅平陸其東有雷穴靈異謹勿觸雲來綿世界雲去一峯獨僧窗或留罅雲入不可逐絶頂横石梁仙人有遺躅山多金光草夜半如列燭靈藥不可尋吁嗟歸太速濠梁四無山坡陁亘長野吾披紫茸氊縱飲面無赭自矜意氣豪敢騎雪中馬行行逆風去初亦略霑灑疾風吹大片忽若亂飄瓦側身當其衝絲鞚袖中把重圍萬箭急馳突更叱咤酒力不支吾數里進一斚燎茅烘濕衣客有見留者徘徊望神州沈歎英雄寡既離湖口縣未至落星灣舟中兩三程程程見廬山廬山遮半天五老雲為冠朝看金叠叠暮看紫巉巉瀑布在山半髣髴認一斑廬山忽不見雲雨滿人間雪霽下揚子閒望江上山山山如白玉日照金孱顔是時江水淨影落清鏡寒潮催庾信老雲送佛貍還萬古感心事惆悵垂楊灣衡山為真宫道士飲我酒共坐有何人山中白衣叟問叟家何在近住山洞口殷勤起見邀徐歩入林藪雲深險徑黒石亂湍水吼尋源行漸逺茅屋剪如帚老烹茶味苦野琢琴形醜叟云司馬遷學道此居久屋東大磐石棊畫今尚有古木庇覆之清泉石根走因悲百年内汲汲成白首仙人固難值隠者亦可偶追惟恍如夢欲畫無好手書昔遊詩後潘檉徳久我行半天下未能到瀟湘君詩如畫圖歴歴記所嘗起我逺逰興其如髩毛霜何以舒此懐轉軫彈清商又韓淲仲止平生未踏洞庭野亦不曽登南嶽峯因君談舊逰恍如常相從江淮歴歴轉湘浦裘馬意氣傳邉烽吾嘗汎大江只見匡廬松乘風醉卧帆影底髙浪直濺嵐光濃日暮泊船時是夜方嚴冬雪花壓船船背重䌫摇柂鼓聲如鐘當年意淺語不到無句可寫波濤舂君詩乃如許景物不易供盡歸一毫端状闕飛龍人間勝處貴著眼雖有此興無由逢錢唐山水亦自好奈何薄宦難從容南髙北髙一千丈潮頭日夜鳴靈蹤應有隠者為識賞青鞵布韈扶杖笻君無詫彼我愧此急還詩巻心徒忪七言古詩送王孟玉歸山隂淮南雪落雲繞戍王郎鳴鞭獵狐兎問君本是山隂人何不扁舟剡溪去人生樂事将無同知君此心如太空只今去踏龍尾道也似寒江蓑笠翁鑑湖一曲荷花浦君不歸來花有語舊宅應添竹幾竿到家不覺秋如許十年雪裏看淮南聚米能作淮南山籌邊妙處須急吐政是不容修竹閒人道長江無六月日光正射青蘆葉何以贈君濯炎熱雪即是詩詩是雪烏夜啼老烏棲棲飛且號晨來枝上啄楮桃楮桃已空楮葉死猶啄枯枝覔蟲蟻老烏賦分何其貧未啼已被鄰公嗔吁嗟老烏不自知牆頭屋上紛成羣吴中貴逰重鸚鵡千金逺致能言語花底紅絛鄭袖擎盤中碧果秦宫取天生靈物得人憐過者須來鸚鵡邊老烏事事無足録人間猶傳夜啼曲余居苕溪上與白石洞天為鄰潘徳久字予曰白石道人且以詩見畀其詞曰人間官爵似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼予以長句報貺南山仙人何所食夜夜山中煮白石世人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峯生肺肝真祖只在南山南我欲從之不憚逺無方煮石何由軟佳名錫我何敢辭但愁自此長苦飢囊中只有轉庵詩便當掬水三嚥之轉庵徳久自號云丁已七月望湖上書事白天碎碎如拆綿黒天昧昧如陳𤣥白黒破處青天出海月飛來光尚濕是夜太史奏月蝕三家各自矜算術或云七分或食既或云食晝不在夕上令御史登吴山下視海門監月出年來歴失無人修三家之說誰為優乍如破鏡光炯炯漸若小兒初食餅時方下令嚴禁銅破鏡何為來海東天邉有餅不可食聞說飢民滿淮北是鏡是餅且勿論須臾還我黄金盆金盆當空四山静平波倒浸雲天影下連八表共此光上接銀河通一冷御史歸家太史眠人間不聞鐘鼓傳白石道人呼釣船一瓢欲酌湖中天荷葉擺頭君睡去西風急送敲窗句送陳敬甫十年所聞溢吾耳去年誦君書一紙古人三語得竒士况此磊落數百字相逢千巖萬壑裏有客如君請兄事才髙自古人所忌論髙不售反驚世好詩取客如劵􅆻我無三者猶至是如君之貧不可避如君之貧不可避呼舟徑度寒潮外生雲軒在山長與雲同齋出山憶雲雲不來千金買得太湖石數峯相對寒崔嵬朝來忽覺青苔濕靉靉如炊石間出白雲何處不相逢却怪年年枉相憶王郎胸中横一丘在山出山雲與遊更呼白石老居士來倚雲根吟七字送項平甫倅池陽項君聲名天宇窄與君俱是荆湖客向來相聞不相值長安城中乃相識論文要得文中天邯鄲學步終不然如君筆墨與性合妙處特過蘇李前我如切切秋蟲語自詭平生用心苦神凝或與元氣接屢舉似君君亦許西湖一曲古牆隂清坐論詩夜向深見謂人間有公等不知來者不如今乾坤雖大知者少君不見古人拙處今人巧我徂山林口挂壁如君合救狂瀾倒石渠春水緑泱泱閣下無人白日長萬里江湖入歸夢子雲不願校書郎九華山色梅根渡半日風帆即秋浦六條察吏安用許幸有千巖作詩侣書乞米帖後銀鈎鐵畫太師字從人乞米亦可憐五倉空虛胃神哭竟日悄悄無炊烟仙人留書說服氣道士辟榖期引年人生不食浪自苦獨不見子桑鼓琴十日雨契丹歌都下聞蕭總管自說其風土如此契丹家住雲沙中耆車如水馬若龍春來草色一萬里芍藥牡丹相間紅大兒牽車小兒舞彈㺯琵琶調美女一春浪蕩不歸家自有穹廬障風雨平沙軟草天鵞肥健兒千騎暁打圍皁旗低昂圍漸急驚作羊角凌空飛海東健鶻健如許韝上風生看一舉萬里追奔未可知劃見紛紛落毛羽平章俊味天下無年年海上驅羣胡一鵞先得金百兩天使走送賢王廬天鵞之飛鐵為翼射生小兒空看得腹中驚怪有新薑元是江南經宿食禽言如曰哥哥君不見苕溪西南石鼓山鳥如鸜鵒啼其間一人相傳是阿弟千呼萬喚去復還身為獨雁失儔侣所愧鶺翎圖急難繞林哀哀訴明月夜䦨月落聲漸咽天地闊逺兄不聞蒼厓下淚山竹裂豈無鴉舅與鵓姑人各有心非友于陟岡四顧空欷歔君不見江南望夫誰家子登山化石不得語次韻誠齋送僕往見石湖長句客來讀賦作雌蜺平生未聞衡說詩省中詩人官事了狎鷗入夢心無機韻髙落落懸清月鏗鏘妙語春冰裂一自長安識子雲三嘆郢中無白雪范公蕭爽思出塵有客如此渠不貧堂堂五字作城守平章勁敵君在口二公句法妙萬夫西來囊中藏魯璵只今擊節烏棲曲不愧當年賀鑑湖送姜尭章謁石湖先生楊萬里廷秀釣璜英氣横白蜺咳唾珠玉皆新詩江山愁訴鸎為泣鬼神露索天洩機彭蠡波心弄明月詩星入腸肺肝裂吐作春風百種花吹散瀕湖數峯雪青鞵布襪軟紅塵千詩只博一字貧吾友彛陵蕭太守逢人說項不離口袖詩東來謁老夫慚無髙價索璠璵翻然欲買松江艇逕去蘇州參石湖白石道人詩集巻上欽定四庫全書白石道人詩集巻下宋姜䕫撰五言律詩題華亭錢參園池花裏藏仙宅簾邊駐客舟浦涵滄海潤雲接洞庭秋草木山山秀䦨干處處幽機雲韜世業暇日此夷猶同朴翁登卧龍山龍尾回平野簷牙出翠微望山憐緑逺坐樹覺春歸草合平吳路鷗忘霸越機午涼松影亂白羽對禪衣坐上和約齋句入冰輪冷愁因玉宇開可無如此客猶恨不能杯好句長城立寒鴉結陣來箜篌莫停手􅂸却斷腸回出北關吴兒臨水宅四面見行舟蒲葉侵鵞項楊枝蘸馬頭年年人去國夜夜月窺樓傳語城中客功名半是愁答沈器之二首江漢乘流客乾坤不繫舟玉琴虛素月金劍落清秋野鹿知隨草飢鷹故上鞲風流大隄曲一唱使人愁涉逺身良苦登髙望欲迷試吟青玉案不是白銅鞮露下秋蟲怨風髙北馬嘶槎頭有新味人在太湖西悼石湖三首身退詩仍健官髙病已侵江山平日眼花鳥暮年心九轉終無助三高竟欲尋尚留巾墊角異國有知音未作龍蛇夢驚聞露電身百年無此老千首屬何人安得公長健那知事轉新酸風憂國淚髙塜卧麒麟未定情鍾痛何堪更悼亡遺書知伏枕來弔只空堂雪裏評詩句梅邊按樂章沈思酒杯落天濶意一作正茫茫七言律詩送朝天續集歸誠齋時在金陵翰墨場中老斲輪真能一筆掃千軍年年花月無閒日處處山川怕見君箭在的中非爾力風行水上自成文先生只可三千首回首江東日暮雲寄上張參政姑蘇臺下梅花樹應為調羮故早開燕寝休誇香霧重鴛行却望衮衣來前時甲第仍垂栁今度沙隄已種槐應念無枝夜飛鵲月寒風勁羽毛摧京口留别張思順伯勞飛燕若為忙還憶東齋夜共牀别後無書非棄我春前會面却他郷連宵為說經憂患異日相逢各老蒼更欲少留天不許暁風吹艇入垂楊次朴翁逰蘭亭韵亞字橋亭面面風六人同坐樹隂中松交歸路如留客石礙流杯故惱公山色最憐秦望緑野花只作晉時紅夕陽啼鳥人将散俯仰興懐自昔同右軍祠堂有杜鵑花兩株極照灼次韵胡仲方因楊伯子見寄此去廬陵定幾程向來卭杖未經行懸知征棹雲邊集大有吟情雪裏生楚渡食萍應甚美舜祠吹玉直能清二君即日青冥上惟我春山帶雨耕仲方得萍鄉宰伯子得營道倅賀張肖翁參政太乙圖書客屢談已知上相出淮南銀臺日月非虚過金鼎功名得細參從此與人為雨露應憐有客卧雲嵐明朝起為蒼生賀旋著藤冠紫竹簪陳君玉以小集見歸用余還誠齋朝天續集韻作七字䕫報貺筆陣無功汗左輪而今老去不能軍水邉白鳥閒於我窗外梅花疑是君欲向江湖行此語可無朋友託斯文新篇大是相料理因憶西山揚子雲寄田郎楚楚田郎亦大竒少年風味我曽知春城寒食誰相伴夜月梨花有所思剪燭屢呼金鑿落倚窗閒品玉參差含情不擬逢人說鸚鵡能歌自作詞送王徳和提舉淮東京塵吹㡌汗淋衣相見頻年只道歸省裏移文那得了家邊持節未為非煮乾碧海知誰用割盡黄雲尚告飢可得不為根本計秋風還見鴈南飛寄時父遲君日日數歸程到得君歸我已行一路好山思共看半年有酒不同傾吾儕正坐清貧累各自而今白髪生人物渺然須强飯天工應不負才名送李萬頃猛相思裏得君來正喜歡時却便回别路恐無青栁折到家應有小桃開起居五馬兼堂上問信千巖及阿灰張禕姪張曙小字阿灰兒女癡頑夫婦健漂零何日共尊罍次韵千巖雜謡中散平生七不堪鳯麈時時伴燕談道士有神傳火棗故人無字入雲藍雨涼竹葉宜三酌日落荷花倚半酣極欲扁舟南蕩去冷鷗輕燕略相諳寄上鄭郎中梅根東望九華雲中有風流衣繡人名下一生勞夢想尊前數語倍情親節旄在道催歸漢花鳥留君且作春見說祥風挾時雨故園松菊亦精神送左真州還長沙吴兒牽挽醉蓴鱸今日西歸略自如别路冷雲隨驛馬望鄉喬木記吾廬湘中花月偏憐酒淮左兒童待擁車凡我舊逰君更歴橘洲相見訝無書乍涼寄朴翁前日松間歩屧歸更将荷葉障秋暉如今城裏抛團扇應是山中試裌衣水有秋容蓮漸少樹含涼氣鳥慵飛炎天既懶趨城市從此尤須戀翠微張平甫哀挽将軍家世出臞儒合上青雲作計疎吴下宅成花未種湖邉地吉草新鉏空嗟過隙催人世賴有提孩讀父書他日石羊芳草路弟兄來此一沾裾五言絶句同潘徳久作明妃詩明妃未嫁時滿宫妬娥眉一朝辭玉陛人人淚雙垂年年心隨雁日日穹廬中遥見沙上月忽憶建章
