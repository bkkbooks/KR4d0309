seq: 9
front:
  text: 宫身同漢使來不同漢使歸雖為塞外婦只著漢家衣
  hash: sha256:47abd35d5eac45694e63f281b870f039d558f48e240874fefed84c021989dfbd
body:
  text: 東堂聫句金風涼夜深吹我蕭蕭髪趙雍和仲起折丹桂枝驚落花上月白石與和甫時甫分題畫巻䕫得剡溪圖枯槎啅乾鵲交臂失夫君奈此一尊酒憑髙空水雲六言絶句金神夜獵圖二首夜半金神羽獵奔走山川百靈雲氣旍旗來下颯然已入青冥後宫嬋娟玉女自鞚八尺飛龍兩兩鳴鞭争𨗳緑雲斜墜春風次韵鴛鴦梅二首晴日小溪沙暖春夢憐渠頸交只怕笛聲驚散費人月咏風嘲漠漠江南烟雨于飛似報初春折過女郎山下料應愁殺佳人馬上值牧兒馬背何如牛背短衣落日空山只麽身歸盤谷未須名滿人間七言絶句過湘隂寄千巖渺渺臨風思美人荻花楓葉帶離聲夜深吹笛移船去三十六灣秋月明雁圖萬里晴沙夕照西此心唯有斷雲知年年數盡秋風字想見江南摇落時除夜自石湖歸苕溪此詩録寄誠齋得報云所寄十詩有裁雲縫霧之妙思敲金戞玉之竒聲細草穿沙雪半銷吴宫烟冷水迢迢梅花竹裏無人見一夜吹香過石橋美人臺上昔歡娱今日空臺望五湖殘雪未融青草死苦無麋鹿過姑蘇黄㡌傳呼睡不成投篙細細激一作擊流冰分明舊泊江南岸舟尾春風颭客燈千門列炬散林鴉兒女相思未到家應是不眠非守嵗小窗春色入燈花三生定是陸天隨又向吴松作客歸已拚新年舟上過倩人和雪洗征衣沙尾風迴一棹寒椒花今夕不登盤百年草草都如此自琢春詞剪燭看笠澤茫茫雁影微玉峯重疉䕶雲衣長橋寂寞春寒夜只有詩人一舸歸桑間篝火却宜蠶風土相傳我未諳但得明年少行役只裁白紵作春衫少小知名翰墨場十年心事只凄涼舊時曽作梅花賦研墨扵今亦自香環玦隨波冷未銷古苔留雪卧牆腰誰家玉笛吹春怨看見鵞黄上栁條臨安旅邸答蘇虞叟垂楊風雨小樓寒宋玉秋詞不忍看萬里青山無處隠可憐投老客長安姑蘇懐古夜暗歸雲繞柁牙江涵星影鷺眠沙行人悵望蘇臺栁曽與吴王掃落花次韻徳久籬落青青花倒垂避人黄鳥雨中飛西郊寂寞無車馬時有溪童賣菜歸次石湖書扇韵橋西一曲水通村岸閣浮萍緑有痕家住石湖人不到藕花多處别開門竹友為徐南卿作髪已星星帶已寛徐卿猶自客長安家山竹好無由看漫種庭心一兩竿世路蒼黄總是愁暮年須得小優㳺如今漸覺知心少賸種青青伴白頭夀朴翁與師同月不同年歸墨歸儒各自緣想得山中無夀酒但攜茶到菊花前湖上寓居雜咏荷葉披披一浦涼青蘆奕奕夜吟商平生最識江湖味聴得秋聲憶故鄉湖上風恬月澹時卧看雲影入玻瓈輕舟忽向窗邊過摇動青蘆一兩枝秋風低結亂山愁千頃銀波凝不流隄畔畫船隄上馬緑楊風裏兩悠悠處處虚堂望眼寛荷花荷葉過䦨干逰人去後無歌鼓白水青山生晚寒輦路垂楊兩行栽苑門秋水欲平階朝朝南望宫雲起白鳥一雙山下來微波衝得緑萍開數㸃青青黏石階緑葑自來還自去來時須載白鷗來布衣何用揖王公歸向蘆根濯軟紅自覺此心無一事小魚跳出緑萍中囊封萬字總空言露滴桐枝欲斷絃時事悠悠吾亦嬾卧看秋水浸山烟苑牆曲曲栁冥冥人静山空見一燈荷葉似雲香不斷小船摇曵入西陵處士風流不並時移家相近若依依夜涼一舸孤山下林黒草深螢火飛卧榻看山緑漲天角門長泊釣魚船而今漸欲抛塵事未了菟裘一悵然鈎窗不忍見南山下有三雛骨未寒惆悵古今同此味二陵風雨晉師還栁下軒窗枕水開畫船忽載故人來與君同過西城路却指烟波獨自回指㸃移舟著栁隄美人相顧復相攜上橋更覺秋香重花在西陵小苑西平甫見招不欲往老去無心聴管絃病來杯酒不相便人生難得秋前雨乞我虚堂自在眠樓閣萬重秋雨裏峯巒四合暮潮邉鳯城今夕凉如水多少人家試管絃三髙祠越國霸來頭已白洛京歸後夢猶驚沈思只羨天隨子蓑笠寒江過一生過桐廬横看山色仰看雲十幅風帆不藉人記取合江江畔樹他年此處好垂綸登烏石寺觀張魏公劉安成岳武穆留題劉云侍兒意真奉命題記諸老凋零極可哀尚留名字壓崔嵬劉郎可是疎文墨幾㸃胭脂汙緑苔過垂虹自作新詞韵最嬌小紅低唱我吹簫曲終過盡松陵路回首烟波十四橋訪費山人稻叢茁茁欲齊肩楊栁僛僛不蔽蟬忽憶石頭城下路槿花斜壓釣魚船牛渚牛渚磯邉渺渺秋笛聲吹月下中流西風不識張京兆畫得蛾眉如許愁武康丞宅同朴翁詠牽牛青花緑葉上疎籬别有長條竹尾垂老覺淡妝差有味滿身秋露立多時朴翁悼牽牛甚竒余亦作不見青青繞竹生西風籬落抱枯藤道人一任空花過愁殺山隂覔句僧過徳清木末誰家縹緲亭畫堂臨水更虚明經過此處無相識塔下秋雲為我生溪上佳人看客舟舟中行客思悠悠烟波漸逺橋東去猶見䦨干一㸃愁項里項里項王之里也在山隂西南二十餘里地多楊梅苔梅皆妙天下王性之賦項里楊梅云只今枝頭萬顆紅猶似咸陽三月火予近得苔梅一株古怪特甚為作七言舊國婆娑㡬樹梅将軍逐鹿未歸來江東父老空相憶枝上年年長緑苔雪中六解塞草汀雲護玉鞍連天花落路漫漫如今却憶當時健下馬題詩不怕寒黄鶴磯邉晚渡時栁花風急片帆飛一聲長笛魚龍舞白浪如山不肯歸萬馬行空轉屋簷髙寒屢索酒杯添故人家住吴山上借得西湖自捲簾曽泛扁舟訪石湖恍然坐我范寛圖天寒逺挂一行雁三十六峯生玉壺萬壑千巖一様寒城中别有玉龍蟠舊人乘興扁舟處今日詩仙戴笠看沈香火裏笙簫合煖玉鞍邉雉兔空辦得煎茶有驕色先生只合作詩窮越中士女春遊秦山越樹兩依依閒倚䦨干看落暉楊栁梢頭春又暗玉簫聲裏夜逰歸送范仲訥往合肥三首壮志只便鞍馬上客夢長在江淮間誰能辛苦運河裏夜與商人争徃還我家曽住赤䦨橋鄰里相過不寂寥君若到時秋已半西風門巷栁蕭蕭小簾燈火屢題詩回首青山失後期未老劉郎定重到煩君說與故人知下菰城人家多在竹籬中楊栁疎疎尚帶風記得下菰城下路白雲依舊兩三峯平甫放三十六鷗扵吴松余不及與盟橋下松陵緑浪横來遲不與白鷗盟知君久對青山立飛盡梨花好句成蕭山歸心已逐晚雲輕又見越中長短亭十里水邊山下路桃花無數麥青青戊午春帖子晴窗日日擬雕蟲惆悵明時不易逢二十五絃人不識淡黄楊栁舞春風偶題阿八宫中酒未醒天風吹髪夜泠泠歸來只怕扶桑晚赤脚横騎太乙鯨陳日華侍兒讀書繹句尋章久未休花房日晏不梳頭誰教郎主能多事乞與冥冥千古愁女郎山漢陽縣西二十里不見郢中能賦客可憐負此女郎山冰魂寂寞無歸處獨宿鴛鴦沙水寒釣雪亭䦨干風冷雪漫漫惆悵無人把釣竿時有官船橋畔過白鷗飛去落前灘緑蕚梅黄雲承韈知何處招得冰魂付北枝金谷樓髙愁欲墮斷腸誰把玉龍吹次韵武伯楊栁風微約暮寒野禽容與只波間道人心性如天馬可愛青絲十二閑觀燈口號十首世間形象盡成燈烘火旋紗巧思生列肆又多看不遍逰人一一把燈行市樓歌吹太喧譁燈若連珠照萬家太守令嚴君莫舞逰人空帶玉梅花逰人總戴孟家蟬争託星毬萬眼圓鬧裏傳呼大官過後車多少盡嬋娟花帽籠頭㡬嵗兒女兒學著内人衣燈前月下無歸路不到天明亦不歸好燈須買不論錢别有琉璃價百千都下貴人多預賞買時長在一陽前珠絡琉璃到地垂鳯頭銜帶玉交枝君王不賞無人進天竺堂深夜雨時紛紛鐵馬小回旋幻出曹公大戰年若使英雄知闕事不教兒女戲燈前貴客鈎簾看御街市中珍品一時來簾前花架無行路不得金錢不肯回修内司人編戲鼓輦宫營裏獨焼燈春風到處皆君賜金栁絲絲滿鳯城正好嬉逰天作魔翠帬無奈雨沾何御街暗裏無燈火處處但聞樓上歌陪張平甫逰禹廟鏡裏山林緑到天春風只在禹祠前一聲何處提壺鳥猛省紅塵二十年寄俞子二首此郎都無子弟氣夜對黄妳籠青燈君今落脚墮鳶外欲往從之歎未能郎罷才名今白髪佐州亦復坐窮邉甚欲出手相料理東南風髙難寄箋白石道人詩集卷下白石道人集外詩宋姜䕫撰燈詞見武林舊事南陌東城盡舞兒畫金刺繡滿羅衣也知愛惜春逰夜舞落銀蟾不肯歸燈已䦨珊月氣寒舞兒往往夜深還只因不盡婆娑意更向階心弄影看沙河雲合無行處惆悵來逰路已迷却入静坊燈火空門門相似列蛾眉逰人歸後天街静坊陌人家未閉門簾裏垂燈照尊俎坐中嬉笑覺春温春詞見武林舊事六軍文武浩如雲花簇頭冠様様新惟有至尊渾不戴盡将春色賜羣臣萬數簪花滿御街聖人先自景靈回不知後面花多少但見紅雲冉冉來同朴翁過浄林廣福院見咸淳臨安志四人松下共盤桓筆硯花壺石上安今日興懐同此味老仙留字在孱顔嘉泰壬戌上元日訪全老扵浄林廣福院觀沈傅師碑隆茂宗畫贈詩見咸淳臨安志深衣跨羸驂杳杳春山路入寺君未知閒看移桂樹沈碑含秀潤隆畫出神竒道人那得此老子乃躭之龍井見咸淳臨安志年時六月海揚塵遥見青山起白雲聞有髙僧來誦咒巖前抛珓問龍君自題畫像見硯北雜志鶴氅如烟羽扇風寄情芳草緑隂中黒頭辦了人間事來看凌霜數㸃紅句小山不能雲大山半為天見歸田詩話屋角紅梅樹花前白石生見愛日齋叢鈔附録諸賢酬贈詩進退格寄張功甫姜堯章楊萬里廷秀尤蕭范陸四詩翁此後誰當第一功新拜南湖為上将更推白石作先鋒可憐公等俱癡絶不見詞人到老窮謝遣管城儂已晚酒泉端欲乞移封題堯章新成草堂周文璞晉仙早将心事付漁樵若被幽人苦見招多種竹将挑筍喫旋栽松待斫柴燒壁間古畫身都碎架上枯琴尾半焦猶有住山窮活計仙經盈卷一村瓢姜堯章金塗佛塔歌又白石招我入書齋使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相飢鷹餓虎紛相向拈起靈山受記時龍天帝釋應惆悵形模逺自流沙至鑄出今回更精緻錢王納土歸京師流落多在西湖寺錢王本是英雄人白蓮花現國主身蛇鄉虎落狗脚朕何如紅袍玉帶稱功臣天封坼開即退聴兩浙不聞笳鼓競歸來佛子作護持太師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地罏山芋羮何曽薫陸綺牀供但見相輪銅緑明哦詩禮塔猶未畢蘆葉低飛山雨濕弔堯章又相逢蕭寺已纍然自詠離騷講太𤣥極目舊逰惟白石傷心孤塜只蒼烟兒從外舍收殘稿客向空山泣斷絃帝所修文與張樂魂兮應是到鈞天和堯章九日送菊二首王炎晦叔對花懶舉玉東西孤負金錢滿緑枝短髩不堪重落帽枯腸何可强捜詩花品若将人品較此花風味似吾儒秋英餐罷含清思曽有離騷續筆無題堯章舊逰詩巻又出郭栽花渉小園歸調琴譜輯詩編少年豪健今揫斂休羡騎鯨李謫仙臘中得雪快晴成古風呈堯章銛老又蒼頭熟睡喚不應光射紙窗疑月明更籌可數夜方半杙上一雞先誤鳴暁起飛花堆戸外幻出人間無色界九街車馬不知寒蹴蹋銀杯翻縞帶杲杲日升東海東須臾光彩蒸霞紅不憂桂玉頓増價人在冲融和氣中貝闕珠宫五雲際遥知天上龍顔喜麥畦白白覆青青農事年來定豐美清明日訪白石不值葛天民無懐花薺懸燈栁拂簷老懐那得似餳甜畫船已載先生去燕子無人自入簾重訪白石又長安惟白石與我最相關每到難逢面翻思懶下山欲歸愁路永小住待君還盡日看幽桂無人似我閒六月一日與堯章泛湖又六月西湖帶雨山小舟終日傍鷗閒風烟如許闗情甚賓主相推下語難幾㸃送君歸大雅一涼今夜滿長安江湖逺思知多少歸去風前各倚䦨
