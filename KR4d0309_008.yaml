front:
  text: 白石道人詩集卷上
  hash: sha256:05318d6f4cc38e1db43fb87a1f25edb396b1ae41e2fc816a33027272287ed4e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0309_SBCK_008-1a}
body:
  text: 番陽薑夔堯章五言古詩以長歌意無極好為老夫聽為韻奉別沔鄂親友滔滔沔鄂留有靦三宿桑持鉢了白日事賤丸蛣蜣念當去石友煙席凌江湘為君試歌商歌短意則長佳人魯山下謂楊大昌正之日弄清漢波促絃調寶瑟哀思感人多咬哇秦缶擊冷落郢客歌知音良不易如此粲者何英英白龍孫鄭仁舉次臯眉目古人氣拮據營數椽下簾草生砌文章作徑庭功用見造次無庸垂罄嗟遺安鹿門意詩人辛國士辛泌克清句法似阿駒别墅滄浪曲緑陰禽鳥呼頗參金粟眼漸造文字無兒輩例學語屋壁祝蒲盧山陰千載人揮灑照八極只今定武刻猶帶龍虎筆單侯出機杼單煒炳文豈是劍舞得餘波入竹石絶歎咄咄逼異時之罘君在涅守白皓黃鐘欠牛鐸淋漓弔遺稿有子殊可人蔡逮堅吾子字武伯特未見此老客來請論文但道曲肱好中郎逰千霜曲髙復誰為龎翁趣無絃鄭伯功斫鼻春風桃花溪寒渌繞蒼翠何當從兩君放浪計幽事宦達羞故妻貧賤厭邱嫂上書雲雨迥還舍筍蕨老江臯鉏帶經決計恨不早士無五羖皮沒世抱枯稿伐木響虛牝吾願友褐夫九關呀虎豹何時內髙袪黃鵠眇雲樹鸚鵡淡煙蕪倚杖得清賞洗心觀本初孤鴻度關山風霜催翅翎影低白雲暮哀噭那忍聽士生有如此儲粟不滿瓶著書窮愁濱可續離騷經赤松圖山東隆凖公未語心已解按劍堂下人成事汝應退非無帶礪約政爾有恩害平生三寸舌松間潄寒瀨虞美人草夜闌浩歌起玉帳生悲風江東可千里棄妾蓬蒿中化石那解語作草猶可舞陌上望騅來翻愁不相顧華藏寺雲海亭望具區寺為張循王功德院茫茫復茫茫中有山蒼蒼大哉夫差國坐占天一方夫差醉蓮宫巨浪搖不醒越師何從來奪我玉萬頃年年亭上秋一笛千古愁誰能知許事飛下雙白鷗夏日寄朴翁朴翁時在靈隱風吹松樹枝懷我松間友雲從北山來令我屢回首山雲夜夜起山雨侵人衣遙知竹窗裏自吟新雨詩春日書懷四首九真何蒼蒼乃在清漢尾衡茅依草木念逺獨伯姊春來衆芳滋春去衆芳萎兄弟各天涯啼鴂見料理漢江出巨魚風雷入驅使安得挾我輈西征二千里春雲驛路暗遊子眇歸程永懷故山下風雨悲柏庭翁仲不解語幽鳥時時鳴人家插垂栁客裏又清眀垂楊大别寺春草郎官湖家巷有石友合并不待呼瘦藤倚花樹花片藉玉壺老鄭談絶妙辛楊句敷腴平生子姚子貌古心甚儒時邀野僧語間與琴工俱酒闌興未了左轉城南隅大江圍楚碧煙水入元虛留落不自恨惟嗟故人疏一月三見夢夢中相與娛日日潮風起悵望武昌魚武昌十萬家落日紫煙低亭亭頭陀塔髙處白鳥棲白鳥忽飛去春山空四圍南樓有佳人再召且再辭閉門課文事攖物深天機斯人不可致白鳥會來歸箜篌引箜篌且勿彈老夫不可聽河邊風浪起亦作箜篌聲古人抱恨死今人抱恨生南鄰賣妻者秋夜難為情長安買歌舞半是良家婦主人雖愛憐賤妾那久住緣貧來賣身不緣觸夫怒日日登髙樓悵望宫南樹侍千巖褰裳望洞庭眼過天一角初别未甚愁别久今始覺作箋非無筆寒雁不肯落蘆花待拿音怪底北風惡若人金石心試命洞庭浪傳聞下巴陵瀝酒喜無恙我行丹楓林屢騁白蘋望烏鵲不可嗔論功當坐上古樂府裁衣贈所歡曲領再三安歡出無人試閨中自著看甚欲逐郎行畏人笑無媒日日東風起西家桃李開令我歌一曲曲終郎見留萬一不當意翻作平生羞雪中訪石湖雪矸如玉城偏師敢輕犯黃蘆陳野鶩我自將十萬三戰渠未降北面石湖范先生霸越手定自一笑粲次韻堯章雪中見贈范成大致能玉龍陳長空臯比忽先犯鱗甲塞天飛戰退三百萬當時訪戴舟却訪一寒范新詩如美人蓬蓽愧三粲賦千巖曲水紅雨灑溪流下瀨仍小駐魚隊獵殘香故故作吞吐老子把一盞微風忽吹去李陵臺李陵歸不得髙築望鄉臺長安一萬里鴻雁隔年回望望雖不見時時一上來呈徐通仲兼簡仲錫通仲與誠齋為鄉人近來赴調而誠齋去國又通仲久與千巖有苕霅之約而未至余挽通仲欲與同歸千巖故末章及之斯文準乾坤作者難屈指我從李郭逰知有徐孺子春風橘洲前白月太湖尾懷哉來無期玉唾炯在𥿄去年識仲氏何啻空谷喜合并忽自天顚倒見底裏維君天下士竹箭東南美胡不在石渠諸公當料理千巖今林宗泉石助風軌示疾不下堂有句髙八米此老筆硯交誠齋古元禮毫端灑秋露去國詞愈偉屬聞都門别回首即桑梓獨憐苕溪上垂榻俟行李煙波肯尋盟歸棹為君艤和轉庵丹桂韻野人復何知自謂山澤好來禆奉常議識笳鼓羽葆誰憐老垂垂却入閙浩浩營巢猶是寓學圃何不早淮桂手所植漢甕躬自抱花開不忍出花落不忍掃佳客夜深來清尊月中倒一禪兩居士更約踐幽討昔逰詩夔蚤嵗孤貧奔走川陸數年以來始獲寧處秋日無謂追述舊逰可喜可愕者吟為五字古句時欲展閲自省生平不足以為詩也洞庭八百里玉盤盛水銀長虹忽照影大哉五色輪我舟度其中晃晃驚我神朝發黃陵祠暮至赤沙曲借問此何處滄灣三十六青蘆望不盡明月耿如燭灣灣無人家只就蘆邊宿放舟龍陽縣洞庭包五河澧沅􅓵湘大江洶洶不得道茫茫將奈何篙師請小泊石矴沈泥沙是中大無岸強指葦與莎滯留三四晨大浪山嵯峩同舟總下淚自謂餧黿鼉白水日以長僅存青草芽轉眄又已沒但見千頃波此時羡白鳥飛入青山阿九山如馬首一一奔洞庭小舟過其下幸哉波浪平大風忽怒起我舟如葉輕或升千丈坡或落千丈坑回望九馬山政與大浪爭如飛鵝車炮亂打睢陽城又如白獅子山下跳鬇鬡須臾入别浦萬死得一生始知茵席濕盡覆杯中羮鬇鬡一作猙獰蕭蕭湘陰縣寂寂黃陵祠喬木蔭樓殿畫壁半傾攲蘆洲雨中淡漁網煙外歸重華不可見但見江鷗飛假令無恨事過此亦依依我乘五板船將入沌河口大江風浪起夜黑不見手同行子周子渠膽大如斗長竿插蘆席船作野馬走不知何所詣生死付之偶忽聞入草聲燈火亦稍有划船遂登岸亟買野家酒天寒白馬渡漢川縣界落日山陽村是時無霜雪萬里風奔奔外旃吹已透內纊冰不溫吹馬馬欲倒吹笠任飛翻不見行路人但見草木蕃忽看野燒起大焰燒乾坤聲如震雷震勢若江湖吞虎豹走散亂麋鹿不足言夜投野店宿無壁亦無門此行值三厄幸得軀命存明發見老姊斗酒為招魂揚舲下大江日日風雨雪留滯鼇背洲十日不得發岸冰一尺厚刀劍觸舟楫岸雪一丈深屹如玉城堞同舟二三士頗壯不恐懾蒙氊閉篷卧波裏任傾側晨興視氊上積雪何皎潔欲上不得梯欲留岸頻裂扳授始得上幸有人見椄荒付兩三家寒苦衣食缺買豬祭波神入市路已絶如今得安坐間對妻兒説青草長沙境洞庭渺相連洞庭西北角雲夢更無邊後有白湖沌渺莽里數千豈惟大盜窟神龍所盤旋白湖辛巳歲忽墮死蜿蜒一鱗大如箕一髯大如椽白身青䰇鬛兩角上捎天半體卧沙上半體猶沈淵里正聞之官官使吏致虔作齋為禳祓觀者足闐闐斂席覆其體數里聞腥羶一夕雷雨過此物忽已遷遺迹陷成川中可行大船是年虜亮至送死江之壖或云祖龍讖詭異非偶然近日山陽人采菱不知還望見三龍浮目若電火然見龍多見尾少見四體全一龍已為異三者亦罕傳又因漁湖側水中忽生煙煙中一驢出繞身步蹁蹮俄隨霹靂去欲語無由緣我聞語此事乘舟往觀焉徑往枯葭浦白鷺爭相先湖有劉備廟實司浩渺權徘徊無所見歸棹月明前昔遊桃源山先次白馬渡桃源縣界渡頭何清深鴻鵠在髙樹白馬亦洞天昔人有竒遇洞門不可見但聞水聲怒瞻彼羽人宅乃乘方船渡修廊夾五殿重閣映千樹規模象魏壯回合緑陰護山椒望五溪壼頭入指顧故宮在其北屋瓦帶松霧古杉晉時物中空野人住外圍四十尺內可十客聚我遊瞿仙館壇上表遺步却下八疊坡一亭衆妙具兩山抱澄潭老木枝幹互瞻前秀而迥坐久凛難駐桃源獨不見僻在宫南路山行轉深邃狙猿紛上下石竇出微涓令我意猶豫昔聞漁舟子水際見洞戶今看去溪逺定自後人誤惆悵却歸來此遊不得屢於今二十年歷歷經行處昔遊衡山下看水入朱陵半空掃積雪萬萬玉花凝或如生綃挂或如薄霧橫紛紛虎豹吼往往蛟龍驚人語不相聞濺雹漂風纓有魚緣峭壁上上終不停此中有神物雷雨周八紘昔遊衡山上未曉入幽谷欲識所坐輿橫板挂兩竹狀如秋千垂髙下不傾覆登山九千丈中道多佛屋一峯髙一峯峯峯秀林木仰看同來客木末見冠服髙臺石橋路尋常雲所宿下方雷雨時此上自晴旭紫蓋何突兀萬里在一目餘峯六七十僅如翠浪矗北有懶瓚巖大石庇樵牧下窺半崖花杯盂琢紅玉飛雲身畔遇攬之不盈掬祝融最髙絶紫蓋不足録俯視同仰觀蒼蒼萬形伏惟餘岣嶁峯南睇半空緑髣佛認瀟湘向嶽流屈曲髙處驚我魂翻思宅平陸其東有雷穴靈異謹勿觸雲來綿世界雲去一峯獨僧窗或留罅雲入不可逐絶頂橫石梁仙人有遺躅山多金光草夜半如列燭靈藥不可尋吁嗟歸太速濠梁四無山坡陀亘長野吾披紫茸氊縱飲面無赭自矜意氣豪敢騎雪中馬行行逆風去初亦略霑灑疾風吹大片忽若亂飄瓦側身當其衝絲鞚袖中把重圍萬箭急馳突更叱吒酒力不支吾數里進一斚燎茅烘濕衣客有見留者徘徊望神州沈歎英雄寡既離湖口縣未至落星灣舟中兩三程程程見廬山廬山遮半天五老雲為冠朝看金疊疊暮看紫巉巉瀑布在山半髣佛認一斑廬山忽不見雲雨滿人間雪霽下揚子間望江上山山山如白玉日照金孱顔是時江水淨影落清鏡寒潮催庾信老雲送佛貍還萬古感心事惆悵垂楊灣衡山為真宫道士飲我酒共坐有何人山中白衣叟問叟家何在近住山洞口殷勤起見邀徐步入林藪雲深險徑黑石亂湍水吼尋源行漸逺茅屋剪如帚老烹茶味苦野琢琴形醜叟云司馬遷學道此居久屋東大磐石棊畫今尚有古木庇覆之清泉石根走因悲百年內汲汲成白首仙人固難值隱者亦可偶追惟恍如夢欲畫無好手書昔逰詩後潘柳德久我行半天下未能到瀟湘君詩如畫圖歷歷記所嘗起我逺逰興其如鬢毛霜何以舒此懷轉軫彈清商又韓淲仲止平生未踏洞庭野亦不曾登南嶽峯因君談舊逰恍如常相從江淮歷歷轉湘浦裘馬意氣傳邊烽吾嘗泛大江只見康廬松乘風醉卧帆影底髙浪直濺嵐光濃日暮泊船時是夜方嚴冬雪花壓船船背重纜搖柂鼓聲如鐘當年意淺語不到無句可寫波濤舂君詩乃如許景物不易供盡歸一毫端狀飛龍人間勝處貴著眼雖有此興無由逢錢唐山水亦自好奈何薄宦難從容南髙北髙一千丈潮頭日夜鳴靈蹤應有隱者為識賞青鞋布襪扶杖笻君無詫彼我愧此急還詩卷心徒忪七言古詩送王孟玉歸山隂淮南雪落雲繞戍王郎鳴鞭獵狐兔問君本是山陰人何不扁舟剡溪去人生樂事將無同知君此心如太空只今去踏龍尾道也似寒江蓑笠翁鑑湖一曲荷花浦君不歸來花有語舊宅應添竹幾竿到家不覺秋如許十年雪裏看淮南聚米能作淮南山籌邊妙處須急吐政自不容修竹間人道長江無六月日光正射青蘆葉何以贈君濯炎熱雪即是詩詩是雪烏夜啼老烏棲棲飛且號晨來枝上啄楮桃楮桃已空楮葉死猶啄枯枝覔蟲蟻老烏賦分何其貧未啼已𬒳鄰公嗔吁嗟老烏不自知牆頭屋上紛成羣吳中貴遊重鸚鵡千金逺致能言語花底紅絛鄭袖擎盤中碧果秦宫取天生靈物得人憐過者須來鸚鵡邊老烏事事無足録人間猶傳夜啼曲余居苕溪上與白石洞天為鄰潘德久字子曰白石道人且以詩見卑其詞曰人間官爵似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼豫以長句報貺南山仙人何所食夜夜山中煮白石世人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峯生肺肝真租只在南山南我欲從之不憚逺無方煮石何由軟佳名錫我何敢辭但愁自此長苦飢囊中只有轉庵詩便當掬水三咽之轉庵德久自號云丁巳七月望湖上書事白天碎碎如拆綿黑天昧昧如陳􅏏白黑破處青天出海月飛來光尚濕是夜太史奏月蝕三家各自矜算術或云七分或食既或云食晝不在夕上令御史登吳山下視海門監月出年來歷失無人修三家之説誰為優乍如破鏡光炯炯漸若小兒初食餅時方下令嚴禁銅破鏡何為來海東天邊有餅不可食聞説飢民滿淮北是鏡是餅且勿論須臾還我黃金盆金盆當空四山靜平波倒浸雲天影下連八表共此光上接銀河通一冷御史歸家太史眠人間不聞鐘鼓傳白石道人呼釣船一瓢欲酌湖中天荷葉擺頭君睡去西風急送𫾣窗句送陳敬甫十年所聞溢吾耳去年誦君書一紙古人三語得竒士況此磊落數百字相逢千巖萬壑裏有客如君請兄事才髙自古人所忌論髙不售反驚世好詩取客如劵契我無三者猶至是如君之貧不可避如君之貧不可避呼舟徑度寒潮外生雲軒在山長與雲同齋出山憶雲雲不來千金買得太湖石數峯相對寒崔嵬朝來忽覺青苔濕靉靉如炊石間出白雲何處不相逢却怪年年枉相憶王郎胸中橫一邱在山出山雲與遊更呼白石老居士來倚雲根吟七字送項平甫倅池陽項君聲名天宇窄與君俱是荆湖客向來相聞不相值長安城中乃相識論文要得文中天邯鄲學步終不然如君筆墨與性合妙處特過蘇李前我如切切秋蟲語自詭平生用心苦神凝或與元氣接屢舉似君君亦許西湖一曲古牆陰清坐論詩夜向深見謂人間有公等不知來者不如今乾坤雖大知者少君不見古人拙處今人巧我徂山林口挂壁如君合救狂瀾倒石渠春水緑泱泱閣下無人白日長萬里江湖入歸夢子雲不願校書郎九華山色梅根渡半日風帆即秋浦六條察吏安用許幸有千巖作詩侶書乞米帖後銀鈎鐵畫太師字從人乞米亦可憐五倉空虛胃神哭竟日悄悄無炊煙仙人留書説服氣道士辟穀期引年人生不食浪自苦獨不見子桑鼓琴十日雨契丹歌都下聞蕭總管自説其風土如此契丹家住雲沙中耆車如水馬若龍春來草色一萬里芍藥牡丹相間紅大胡牽車小胡舞彈胡琵琶調胡女一春浪蕩不歸家自有穹廬障風雨平沙軟草天鵝肥胡兒千騎曉打圍皂旗低昂圍漸急驚作羊角凌空飛海東健鶻健如許韝上風生看一舉萬里追奔未可知劃見紛紛落毛羽平章俊味天下無年年海上驅羣胡一鵝先得金百兩天使走送賢王廬天鵝之飛鐵為翼射生小兒空看得腹中驚怪有新薑元是江南經宿食禽言如曰哥哥君不見苕溪西南石鼓山鳥如鸜鵒啼其間一人相傳是阿弟千呼萬喚去復還身為獨雁失儔侶所愧鶺鴒圖急難繞林哀哀訴明月夜闌月落聲漸咽天地闊逺兄不聞蒼崖下淚山竹裂豈無鴉舅與鵓姑人各有心非友于陟岡四顧空欷歔君不見江南望夫誰家子登山化石不得語次韻誠齋送僕往見石湖長句客來讀賦作雌霓平生未聞衡説詩省中詩人官事了狎鷗入夢心無機韻髙落落懸清月鏗鏘妙語春冰裂一自長安識子雲三嘆郢中無白雪范公蕭爽思出塵有客如此渠不貧堂堂五字作城守平章徑敵君在口二公句法妙萬夫西來囊中藏魯璵只今擊節烏棲曲不愧當年賀鑑湖送薑堯章謁石湖先生楊萬里廷秀釣璜英氣橫白霓咳唾珠玉皆新詩江山愁訴鶯為泣鬼神露索天泄機彭蠡波心弄明月詩星入腸肺肝裂吐作春風百種花吹散瀕湖數峯雪青鞋布襪軟紅塵千詩只博一字貧吾友彛陵蕭太守逢人説項不離口袖詩東來謁老夫慚無髙價索璠璵翻然欲買松江艇徑去蘇州參石湖白石道人詩集卷上
