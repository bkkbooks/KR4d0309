front:
  text: 白石道人歌曲卷一
  hash: sha256:09e4bda6eef2f78b7e6c580fe664d9bc85a1950e40dd32b87c88674b24e61f79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0309_SBCK_001-1a}
body:
  text: 番陽薑夔堯章歌曲聖宋鐃歌鼓吹曲十四首慶元五年青龍在己亥番陽民薑夔頓首上尚書臣聞鐃歌者漢樂也殿前謂之鼓吹軍中謂之騎吹其曲有朱鷺等二十二篇由漢逮隋承用不替雖名數不同而樂紀罔墜各以詠歌祖宗功業唐亡鐃部有栁宗元作十二篇亦棄弗録神宋受命帝績皇烈光耀震動而逸典未舉乃政和七年臣工以請上詔製用中更否擾聲文罔傳中興文儒荐有擬述不麗于樂厥誼不昭臣今製曲辭十四首昧死以獻臣若稽前代鐃歌咸敘威武衄人之軍屠人之國以得土疆乃矜厥能惟我太祖太宗真仁髙宗或取或守罔匪仁術討者弗戮執者弗劉仁融義安歷數彌永故臣斯文特倡盛德其辭舒和與前作異臣又惟宋因唐度古曲墜逸鼓吹所録惟存三篇譜文乖訛因事製辭曰導引曲十二時六州歌頭皆用羽調音節悲促而登封岱宗郊祀天地見廟耕藉帝后册寶發引升祔五禮殊情樂不異曲義理未究乞詔有司取臣之詩協其清濁被之簫管俾聲暢辭達感藏人心永念宋德無有紀極海內稱幸臣夔頓首上尚書上帝命太祖受命也五季亂極人心戴宋太祖無心而得天下也上帝命惟皇皇俶作宋祚五王不綱陳橋之夕帝服自黃惟帝念民惟民念靖八紘一春不曰豫聖璇題玉除龍路孔蓋得之非心遜亦云易有弟聖賢我祚萬年十世之後乃復其天河之表破澤州也李筠不知天命自慿其勇不能降心以至於叛而死也河之表曰上黨彼耽耽踞奧壤交韔百斤不如一仁撥汗千里莫能脫身帝整其旅疇曰汝武心飛太行膽落戰鼓淮海濁定維揚也李重進自謂周大臣不屈於太祖作鐵劵以安之猶據鎮叛淮海濁老將戾帝心堯舜信在劵外汝胡弗思與越豨輩皇威壓之燕壘自碎維宋佐命維周碩臣汝獨狐疑用殱厥身沅之上取湖南也湖南有難乞援於我至則拒焉我師取之沅之上故王都今焉在空雲蕪勢危則呼勢謐則叛背豫德心繄爾作難東屆巴邱西盡九疑蠻師委伏願還耕犂岧岧鎮山火德之紀真人方興百神仰止皇威暢得荆州也我師救湖南道荆州髙繼沖懼歸其土皇威暢附庸讋渚宫三月春草發漢家旌旗繞城堞小臣不敢煩天威再拜敢以荆州歸帝得荆州不為喜百萬愁鱗濯春水蜀山邃取蜀也孟昶恃其國險且結河東以拒命兵加國除蜀山邃蜀主肆謂當萬年不亮天意帝曰全斌汝征自秦關門不守吏啼白雲帝曰光誼汝征自峽瞿唐反波助我肆伐蜀人號呼乞生于師蜀囚素衣天子憐之時雨霈取廣南也劉鋹淫虐我師弔其民俘鋹以歸時雨霈旱火絶聖人出虐政滅五嶺之君盲風怪雲毒蛇臻臻相其不仁南兵象陳自謂孔武有獻在廟偽臣偽主降者榮之叛者生之將不若是彼死爭之十偽之夷一用此道天祐烈祖仁以易暴望鍾山下江南也李煜乍臣乍叛勢窮乃降而我師未嘗戮一人也望鍾山睇揚子波湯湯雲靡靡主歌臣謡樂未已詔書屢呼不為起釣絲夜緯匪魴鯉長虹西徠波可履嗚呼慿凌果何恃辨士疾馳拜前陛曰臣有罪當萬死帝曰盍歸豫宥爾我師入其都矢不踐螻蟻至今鍾山雲猶帶仁義氣大哉仁吳越錢俶獻其國也大哉仁萬世輔后皇明明監于下俶若曰亶為民封殖一姓吁不仁瞻彼日月爝火敢出震震皇皇帝命是式吏其稅租府其版圖爾豈固負俾民作俘維宋之仁中天建國吳山越濤衛我帝宅維俶之仁世世麗澤子孫來朝車馬玉帛謳歌歸陳洪進以漳泉來獻也謳歌歸兮四海一強國潰兮弱國入彼無諸兮計將安出天不震兮民不荼象齒貢兮沈水輸保室家兮長娭娛伐功繼克河東也始太祖之伐河東誓不殺一人又哀劉氏之不祀故緩取之至太宗始得其地伐功繼吁以時烈祖有造太宗濟之河東雖微方命再世河東雖強卒奪其帥惟漢之葉保于此都烈祖念汝乃貸未鉏一夫殘生帝也不取雨露既洽河東自舉河東既平九有以寧嗚呼太宗繼伐有聲帝臨墉親征契丹於澶淵也帝臨墉六師厲胡如雲暗九地帝曰吁胡警豫凖曰帝毋庸虞晉之謝胡宅夏驕弗懲薄兹野我謀臧我武揚帝在兹胡且亡椎虞機激流矢一酋仆萬胡靡勝不戰惟唐虞魄斯禠焚穹廬帝曰吁棄汝過粵明年使來賀維四葉美致治也維四葉聖承烈羣生熙德施浹吁嗟仁兮帝垂衣淡無為日月出照玉墀吁嗟仁兮帝乘輅六龍儛神示下繹鐘鼓吁嗟仁兮周八區耆以醇稼如海桑如雲吁嗟仁兮炎精復歌中興也炎精復天馬度人漢思狄為懼洛水深深漠雲陰陰維帝傷心帝心激烈將蹀胡血天地動色惟哀盡劉馳使之輈包將之矛皇基再峙有統有紀施于孫子天酬帝仁遹符夢靈遹臻太平越九歌越人好祠其神多古聖賢豫依九歌為之辭且系其聲使歌以祠之南㽔林南林黃太姑㽔姑太姑林黃太黃清清清應南央央帝旗羣冕相輿聿來我媯我藝緑滋維湘林南黃太黃姑㽔姑太姑林黃太黃南黃清應南與楚謂狩在渚雲橫九疑帝若來下我懷厥初㽔林㽔姑黃太黃姑應南林南太黃清清應南㽔林孰耕孰漁勿忘惠康疇匪帝餘博碩于爼維錯㽔姑姑太黃姑㽔林黃黃清于豆瑶灑玉離侑此桂酒右帝舜楚調林南林仲夾林南無黃林仲夾黃太黃清清清無南黃清登崇邱懷美功窋䆛在雲其𪷟享維德輯萬國無南林夾仲林仲太黃夾仲林無黃太黃清清清南無轍轇轕蹇時宅珠為橇玉為車報我則腆不當南林仲夾林仲太黃林仲林無南林黃太黃清清清林厥拘王斾返風偃偃山鳥呼觚稜晚豐豫諶菲仲夾可薦右王禹吳調夾鍾宫黃太黃清清清南林南姑太黃南無黃清姑南太黃清清無南雲蒼涼山嶻嶭瞻靈旗闖越絶故宫凄凄生緑林姑太姑黃姑太姑林南太黃清清無南黃清太黃清清南蕪謀臣安在空五湖酹君君毋西入吳洪濤卷黃清無南林南林南黃姑太姑林南太清林黃太黃清清清地龍工呼函堅操剡何睢盱彼茁竹箭楊梅朱無南林姑無林南仲姑太姑林姑太黃黃清壺觴有酎盤有魚千春萬春勿忘此故都右越王越調無射商應黃清應南㽔應南應太清應南㽔姑太黃太太南凄其我思永矢弗遊鳬曰豫肖以璗與鏐載尸應南太清㽔南應太清應南㽔姑太黃太載謁子惠思越翩其來而乘濤駕月右越相側商調黃鍾商無黃清無仲太仲南林仲林太黃清清無林南林仲無太民荼嬴天紀瀆羣雄橫徂君逐鹿傅懸於投匪智姑太仲太仲林太黃清清無太清仲林南林無太清仲無伊福或肉以昌或斧以亡謂豫復歸有如大江仲太仲林太黃清清無太清仲林南林南無黃太仲我無君尤君胡我慊亦有子孫在阿在崦靈太仲林無太黃清清無兮歸來築宫崔嵬右項王古平調無射宫林仲黃清無南林仲太黃林仲夾仲南林仲南黃太海雲碧兮崔嵬灘上去兮灘下來豫乘舟兮遲女仲太夾仲林仲林仲黃太仲南黃太黃清清清南林仲目屢眩兮漚飛白馬駃兮素縿舞驅銀山兮疊林南黃太仲太夾太黃無南林仲太夾仲南黃萬鼓汨豫從天兮南逝經西陵兮掠漁浦夫在太仲黃太仲南林仲南黃太黃清清清南林南黃清夾太黃舶兮婦在房風浩浩兮波茫茫瀝豫酒兮神龍府林仲黃太仲林仲我征至兮無所苦右濤之神雙調仲夾仲黃清林夷黃太黃清清清林仲夾仲太夾太黃夾林玉副笄錦結褵含清揚兮鬱翠眉嚶嚶歌兮有待夷黃夾仲折字仲黃太黃清清清無夷黃清仲太夾太黃夾柳屢舞兮僛僛昔何止兮水湄今何徵兮未來仲夾仲林黃清無黃夷黃夾仲仲折字仲黃太黃清清清夷吾無欲兮女之佩羌猶豫兮而裴回黃頭兮呼黃清仲太夾太黃仲夾仲林夷仲夾仲折字仲仲夾風旗尾兮栩栩潮枯兮沙遲將子兮無怒舟去黃清林夷林仲太夾仲兮無歸花落兮鳥啼右曹娥蜀側調夷則羽應南應太清太姑應林㽔姑折字姑應折字應林南應鞭卧龍躍鏡浦靈之來曀如雨環玉廂翠􅌭紛㽔林㽔姑太姑南應折字應南應南林㽔姑㽔林靈之逝扉出雲我行其野有穱有稌入其闉闍太㽔太姑南應折字應林南林應折字應南林太㽔載歌載儛祓我家室曰豫父母髙田萊蕪下田太姑南應折字應㽔林南應林太清太姑折字姑舄鹵爾澤毋三爾煦毋五益嚴祀其終古右龎將軍髙平調林鍾羽夷南夷㽔夾姑㽔夾夷南夷㽔夾折字夾夷㽔夾㽔師環城兮鳥不度萬夫投戈兮子獨武車轍厲兮姑夾大㽔夷㽔太清應太清應太清應南夷㽔夷夾㽔螳螂怒抗豫義兮出行伍詩書發冡兮嗟彼傖夷夾南夷㽔夾夷應夾折字夾夾南夷㽔姑夾大應父父老死兮後生莫知其故廟無人兮鼠穴堵歌太清應夷㽔夷應豫詩兮詔萬古右旌忠中管商調南吕商無太黃清清無林夷無無夷林仲仲夾仲黃太黃清清無大愛豫親兮保豫體將臨淵兮髮上指子青襟兮父夾仲夷無夷林仲夷無折字無太黃清清無黃清無夷無為史不如緹縈兮鬱陶以死豺為政兮吾已矣太夷林仲太夾仲無太黃清清無夷林仲夾仲夾太無望奫淪兮倐而逝卧龍山兮若耶水靈不歸兮父折字無無太黃清清無林夷無無夷林仲大夾仲夷無思子雨鳴荷兮風入葦若伊優兮泣未已率我太黃清清無仲夷黃清無夷折字無子兮與弟屋陽阿兮招爾右蔡孝子中管般瞻調大吕羽古今譜法合下四四下一一上勾尺下工工下凡凡六下五五一五黃大太夾姑仲㽔林夷南無應黃大大夾清清清清折字法箎笛有折字假如上折字下無字即其聲比無字微高餘皆以下字為凖金石弦匏無折字取同聲代之琴曲側商調琴七弦散聲具宫商角徴羽者為正㺯慢角清商宫調慢宫黃鍾調是也加變宫變徴為散聲者曰側㺯側楚側蜀側商是也側商之調久亡唐人詩云側商調裏唱伊州豫以此語尋之伊州大食調黃鍾律法之商乃以慢角轉弦取變宫變徴散聲此調甚流美也蓋慢角乃黃鍾之正側商乃黃鍾之側它言側者同此然非三代之聲乃漢燕樂爾豫既得此調因製品弦法并白石道人歌曲卷一白石道人歌曲跋歌曲特文人餘事耳或者少諧音律白石留心學古有志雅樂如會要所載奉常所録未能盡見也聲文之美槩具此編嘉泰壬戌刻於雲間之東巖其家轉徙自隨珍藏者五十載淳祐辛亥復歸嘉禾郡齋千歲令威夫豈偶然因筆之以識歲月端午日菊坡趙與訔書至正十年歲在庚寅正月望日如葉君居仲本于錢唐之用拙幽居既畢因以識其後云天台陶宗儀九成此書俾他人抄録故多有誤字今將善本勘讐方可人意後十一年庚子夏四月也白石道人集外詩番陽薑夔堯章燈詞見武林舊事南陌東城盡舞兒畫金刺繡滿羅衣也知愛惜春遊夜舞落銀蟾不肯歸燈巳闌珊月氣寒舞兒往往夜深還只因不盡婆娑意更向階心弄影看沙河雲合無行處惆悵來逰路已迷却入靜坊燈火空門門相似列蛾眉遊人歸後天街靜坊陌人家未閉門簾裏垂燈照尊爼坐中嬉笑覺春溫春詞見武林舊事六軍文武浩如雲花簇頭冠樣樣新惟有至尊渾不戴盡將春色賜羣臣萬數簪花滿御街聖人先自景靈回不知後面花多少但見紅雲冉冉來同朴翁過淨林廣福院見咸淳臨安志四人松下共盤桓筆硯花壺石上安今日興懷同此味老仙留字在孱顔嘉泰壬戌上元日訪全老於淨林廣福院觀沈傅師碑隆茂宗畫贈詩見咸淳臨安志深衣跨羸驂杳杳春山路入寺君未知間看移桂樹沈碑含秀潤隆畫出神竒道人那得此老子乃耽之龍井見咸淳臨安志年時六月海揚塵遙見青山起白雲聞有髙僧來誦咒巖前拋珓問龍君自題畫像見硯北雜志鶴氅如煙羽扇風寄情芳草緑陰中黑頭辦了人間事來看凌霜數點紅句小山不能雲大山半為天見歸田詩話屋角紅梅樹花前白石生見愛日齋叢鈔附録諸賢酬贈詩進退格寄張功甫薑堯章楊萬里廷秀尤蕭范陸四詩翁此後誰當第一功新拜南湖為上將更推白石作先鋒可憐公等俱癡絶不見詞人到老窮謝遣管城儂已晚酒泉端欲乞移封題堯章新成草堂周文璞晉仙早將心事付漁樵若𬒳幽人苦見招多種竹將挑筍喫旋栽松待斫柴燒壁間古畫身都碎架上枯琴尾半焦猶有住山窮活計仙經盈卷一村瓢薑堯章金塗佛塔歌又白石招我入書齋使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相飢鷹餓虎紛相向拈起靈山受記時龍天帝釋應惆悵形模逺自流沙至鑄出今回更精緻錢王納土歸京師流落多在西湖寺錢王夲是英雄人白蓮花現國主身蛇鄉虎落狗腳朕何如紅袍玉帶稱功臣天封坼開即退聽兩浙不聞笳鼓競歸來佛子作護持太師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地罏山芋羮何曾薰陸綺牀供但見相輪銅緑明哦詩禮塔猶未畢蘆葉低飛山雨濕弔堯章又相逢蕭寺已纍然自詠離騷講太玄極目舊遊惟白石傷心孤冢只蒼煙兒從外舍收殘稿客向空山泣斷絃帝所修文與張樂魂兮應是到鈞天和堯章九日送菊二首王炎晦叔對花懶舉玉東西孤負金錢滿緑枝短鬢不堪重落帽枯腸何可強搜詩花品若將人品較此花風味似吾儒秋英餐罷含清思曾有離騷續筆無題堯章舊遊詩卷又出郭栽花涉小園歸調琴譜輯詩編少年豪健今揫斂休羡騎鯨李謫仙臘中得雪快晴成古風呈堯章銛老又蒼頭熟睡喚不應光射紙窗疑月明更籌可數夜方半杙上一雞先誤鳴曉起飛花堆户外幻出人間無色界九街車馬不知寒蹴踏銀杯翻縞帶杲杲日升東海東須臾光彩蒸霞紅不憂桂玉頓增價人在沖融和氣中貝闕珠宫五雲際遙知天上龍顔喜麥畦白白覆青青農事年來定豐美清明日訪白石不值葛天民無懷花薺懸燈柳拂簷老懷那得似餳甜畫船已載先生去燕子無人自入簾重訪白石又長安惟白石與我最相關每到難逢面翻思懶下山欲歸愁路永小住待君還盡日看幽桂無人似我間六月一日與堯章泛湖又六月西湖帶雨山小舟終日傍鷗間風煙如許關情甚賓主相推下語難幾點送君歸大雅一涼今夜滿長安江湖逺思知多少歸去風前各倚闌投贈詩詞補遺次薑堯章贈詩卷中韻陳造唐卿徐郎巢已焚庭竹亦無在太倉五升米舉室枵腹待云何鮭菜供日與長翁對世有作金術閭里頗猜怪丘嫂翦髻餘舊質疊新債詩傳侯王家翰墨到省寺薑郎粲然文羣飛見孔翠論交辱見豫盧馬果同異念君聚百指一飽仰臺餽我亦多病過忍口嚴酒戒終勝栁栁州吐水賦解崇壯年志在行皇皇困無君老矣此念灰去住如間雲詩壇二三子一見勝百聞徐郎吳下業絢麗工語言滔天自濫觴昔人求其源隱几有妙領未覺市聲喧自甘謝祖風屑屑掃一室準擬髙史來函丈置三席聲名絶輩行文字追古昔黃白馬上郎覿面不相挹眼青節食事日耐飢雷吼兹幸陪衆後酒巵甫到口不離寂莫濵徑造無何有問津歸有期尚許尋盟否次堯章餞南卿韻二首又薑郎未仕不求田倚賴生涯九萬箋稇載珠璣肯分我北關當有合肥船風調心期契鑰同誰教社燕辟秋鴻莫年孤陋仍漂泊可得斯人慰眼中三部樂賦薑石帚漁隱吳文英夢窗江鶂初飛蕩萬里素雲際空如沫詠情吟思不在秦箏金屋夜潮上明月蘆花傍釣蓑夢逺句清𫾣玉翠罌汲曉欵乃一聲秋曲片􅏃障雨乘風半竿渭水伴鷺汀幽宿那知暖袍挾錦低簾籠燭鼓春波載花萬斛帆鬛轉銀河可掬風定浪息蒼茫外天浸寒緑三姝媚薑石帚館水磨方氏會飲總宜即事寄毛荷瑭又酣春清鏡裏照清波明眸莫雲愁斂半緑垂絲正楚腰纎瘦舞衣初試燕客飄零煙樹冷青驄曾繫畫館朱橋還托青尊慰春憔悴離苑幽坊深閉恨淺薄東風褪香銷膩綵扇翻歌最賦情偏在笑紅顰翠暗拍闌干看散盡斜陽船市付與嬌鶯金衣清曉花深未起解連環留别薑石帚又思和雲結斷江樓望睫雁飛無極正岸栁衰不堪攀忍持贈故人送秋行色嵗晚來時暗香亂石橋南北又長亭莫雪點點泪痕總成相憶杯前寸陰似擲幾酬花唱月連夜浮白省聽風聽雨笙簫向别枕倦醒絮揚空碧片葉愁紅趂一舸西風潮汐嘆滄波路長夢短甚時到得拜星月慢薑石帚以盆蓮數十置中庭宴客其中又絳雪生涼碧霞籠夜小立中庭蕪地昨夢西湖老扁舟身世嘆遊蕩暫賞吟花酌露尊俎冷玉紅香罍洗眼眩意迷古陶洲十里翠參差淡月平芳砌磚花滉小浪魚鱗起霧盎淺障青羅洗湘娥春膩蕩蘭煙麝馥濃侵醉吹不散繡屋重門閉又怕便緑減西風泣秋檠燭外齊天樂贈薑石帚又餘香才潤鸞綃汗秋風夜來先起霧鎖林深藍浮野濶一笛漁蓑漚外紅塵萬里就中決銀河冷涵空翠岸觜沙平水楊隂下晚𥘉艤桃溪人住最久浪吟誰得到蘭蕙疏綺研色寒雲籖聲亂葉蘄竹簟紋如水笙歌醉裏步明月丁東靜傳環佩更展芳塘種花招燕子惜紅衣豫從薑石帚遊苕霅間三十五年矣重來傷今感昔聊以詠懷又鷺老秋絲蘋愁暮雪鬢那不白倒栁移栽而今暗溪碧烏衣細語相伴惹茸紅曾約南陌前度劉郎尋流花蹤迹朱樓水側雪面波光河蓮沁顔色當時醉近繡箔三十六磯重到清夢冷雲南北買釣舟溪上應有煙簔相識暗香疏影猶記已卯庚辰之間初識堯章于維揚己丑嘉興再會自此契濶聞堯章死西湖嘗助諸丈為殯之今又不知幾年矣自昭忽録示堯章暗香疏影二詞因信手酬酢并賡潘德久之詩云吳潛毅夫雪來比色對淡然一笑休喧笙笛莫怪廣平鐡石心腸為伊折偏是三花兩蘂消萬古才人騷筆尚記得醉臥東園天幕地為席回首往事寂正雨暗霧昏萬種愁積錦江路悄媒聘音沈兩空憶終是茅簷竹户難指望凌煙金碧憔悴了羌管裏怨誰始得右暗香佳人步玉待月來弄影天挂參宿冷透屏幃清入肌膚風𫾣又聽簷竹前村不管深雪閉猶自繞枝南枝北笇平生此假幽竒占壓百花曾獨間想羅浮舊恨有人正醉裏珠翠娥緑夢斷魂驚幾許淒涼却是千秋梅屋雞聲野渡溪橋滑又角引戍樓悲曲怎得知清足亭邊自在杖藜巾幅自注云梅聖俞詩云十分清意足余别墅有梅亭扁曰清足右踈影
