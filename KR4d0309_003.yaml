front:
  text: 白石道人歌曲卷三
  hash: sha256:b1888ee1b9b915dc617fca445da7f644db4432b8c5e40db669121d3f8109315e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0309_SBCK_003-1a}
body:
  text: 番陽薑夔堯章慢霓裳中序第一丙午歲留長沙登祝融因得其祠神之曲曰黃帝鹽蘇合香又於樂工故書中得商調霓裳曲十八闋皆虛譜無辭按沈氏樂律霓裳道調此乃商調樂天詩云散序六闋此特兩闋未知孰是然音節間雅不類今曲豫不暇盡作作中序一闋傳於世豫方羈遊感此古音不自吟因賦此闋蓋過旬塗藁乃定朴翁咎豫無益然意所耽不能自已也平甫商卿朴翁皆工於詩所出竒詭豫亦強追逐之此行既歸各得五十餘解雙槳蓴波一蓑松雨暮愁漸滿空闊呼我盟鷗翩翩欲下背人還過木末那回歸去蕩雲雪孤舟夜發傷心重見依約眉山黛痕低壓采香涇裏春寒老子婆娑自歌誰答垂虹西望飄然引去此興平生難遏酒醒波逺政凝想明璫素襪如今安在唯有闌干伴人一霎齊天樂黃鍾宫丙辰歲與張功父會飲張達可之堂聞屋壁間蟋蟀有聲功父約豫同賦以授歌者功父先成辭甚美豫徘徊茉莉花間仰見秋月頓起幽思尋亦得此蟋蟀中都呼為促織善鬭好事者或以二三十萬錢致一枚鏤象齒為樓觀以貯之庾郎先自吟愁賦凄凄更聞私語露濕銅鋪苔侵石井都是曾聽伊處哀音似訴正思婦無眠起尋機杼曲曲屏山夜涼獨自甚情緒西窗又吹暗雨為誰頻斷續相和砧杵候館迎秋離宫弔月別有傷心無數豳詩謾與笑籬落呼燈世間兒女寫入琴絲一聲聲更苦宣政間有士大夫製蟋蟀吟滿江紅滿江紅舊調用仄韻多不協律如末句云無心撲三字歌者將心字融入去聲方諧音律豫欲以平韻為之久不能成因泛巢湖聞逺岸簫鼓聲問之舟師云居人為此湖神姥壽也豫因祝曰得一席風徑至居巢當以平韻滿江紅為迎送神曲言訖風與筆俱駃頃刻而成末句云聞珮環則協律矣書以緑箋沈于白浪辛亥正月晦也是歲六月復過祠下因刻之柱間有客來自居巢云土人祠姥輒能歌此詞按曹操至濡須口孫權遺操書曰春水方生公宜速去操曰孫權不欺孤乃徹軍還濡須口與東關相近江湖水之所出入豫意春水方生必有司之者故歸其功於姥云仙姥來時正一望千頃翠瀾旌旗共亂雲俱下依約前山命駕羣龍金作軛相從諸娣玉為冠廟中列坐如夫人者十三人向夜深風定悄無人聞珮環神竒處君試看奠淮右阻江南遣六丁雷電別守東關却笑英雄無好手一篙春水走曹瞞又怎知人在小紅樓簾影間一蕚紅丙午人日豫客長沙別駕之觀政堂堂下曲沼沼西負古垣有盧橘幽篁一徑深曲穿徑而南官梅數十株如椒如菽或紅破白露枝影扶踈著屐蒼苔細石間野興橫生亟命駕登定王臺亂湘流入麓山湘雲低昻湘波容與興盡悲來醉吟成調古城陰有官梅幾許紅蕚未宜簪池面冰膠牆腰雪老雲意還又沈沈翠藤共間穿徑竹漸笑語驚起卧沙禽野老林泉故王臺榭呼喚登臨南去北來何事蕩湘雲楚水目極傷心朱戶黏雞金盤簇燕空歎時序侵尋記曾共西樓雅集想垂楊還裊萬絲金待得歸鞍到時只怕春深念奴嬌豫客武陵湖北憲治在焉古城野水喬木參天豫與二三友日蕩舟其間薄荷花而飲意象幽間不類人境秋水且涸荷葉出地尋丈因列坐其下上不見日清風徐來緑雲自動間于疏處窺見遊人畫船亦一樂也朅來吳興數得相羊荷花中又夜泛西湖光景竒絶故以此句寫之閙紅一舸記來時嘗與鴛鴦為侶三十六陂人未到水佩風裳無數翠葉吹涼玉容銷酒更灑菰蒲雨嫣然搖動冷香飛上詩句日暮青蓋亭亭情人不見爭忍凌波去只恐舞衣寒易落愁入西風南浦高桞垂陰老魚吹浪留我花間住田田多少幾回沙際歸路又謝人惠竹榻楚山修竹自娟娟不受人間袢暑我醉欲眠伊伴我一枕涼生如許象齒為材花藤作面終是無真趣梅風吹溽此君直恁清苦須信下榻殷勤翛然成夢夢與秋相遇翠袖佳人來共看漠漠風煙千畝蕉葉窗紗荷花池館別有留人處此時歸去為君聽盡秋雨眉嫵一名百宜嬌戲仲逺看垂楊連苑杜若侵沙愁損未歸眼信馬青樓去重簾下娉婷人妙飛燕翠樽共欵聽艷歌郎意先感便攜手月地雲階裏愛良夜微暖無限風流疏散有暗藏弓履偷寄香翰明日聞津鼓湘江上催人還解春纜亂紅萬點悵斷魂煙水遙逺又爭似相攜乘一舸鎮長見月下笛與客攜壺梅花過了夜來風雨幽禽自語啄香心度牆去春衣都是柔荑剪尚沾惹殘茸半縷悵玉鈿似掃朱門深閉再見無路凝佇曾遊處但繫馬垂楊認郎鸚鵡揚州夢覺彩雲飛過何許多情須倩梁間燕問吟袖弓腰在否怎知道誤了人年少自恁虛度清波引豫久客古沔滄浪之煙雨鸚鵡之草樹頭陀黃鶴之偉觀郎官大別之幽處無一日不在心目間勝友二三極意吟賞朅來湘浦歲晚凄然步繞園梅摛筆以賦冷雲迷浦倩誰喚玉妃起舞歲華如許野梅弄眉嫵屐齒印蒼蘚漸為尋花來去自隨秋雁南來望江國渺何處新詩漫與好風景長是暗度故人知否抱幽恨難語何時共漁艇莫負滄浪煙雨況有清夜啼猿怨人良苦法曲獻仙音俗名大石黃鍾商張彥功官舍在鐡冶嶺上即昔之教坊使宅高齋下瞰湖山光景竒絶豫數過之為賦此虛閣籠寒小簾通月暮色偏憐高處樹隔離宫水平馳道湖山盡入尊俎奈楚客淹留久砧聲帶愁去屢回顧過秋風未成歸計誰念我重見冷楓紅舞喚起淡粧人問逋仙今在何許象筆鸞箋甚而今不道秀句怕平生幽恨化作沙邊煙雨琵琶仙黃鍾商吳都賦云户藏煙浦家具畫船唯吳興為然春遊之盛西湖未能過也己酉歲豫與蕭時父載酒南郭感遇成歌雙槳來時有人似舊曲桃根桃葉歌扇輕約飛花蛾眉正竒絶春漸逺汀洲自緑更添了幾聲啼鴂十里揚州三生杜牧前事休説又還是官燭分煙奈愁裏匆匆換時節都把一襟芳思與空階榆莢千萬縷藏鴉細柳為玉樽起舞回雪想見西出陽關故人初別玲瓏四犯此曲雙調世别有大石調一曲越中歲暮聞簫鼓感懷疊鼓夜寒垂燈春淺匆匆時事如許倦遊歡意少俯仰悲今古江淹又吟恨賦記當時送君南浦萬里乾坤百年身世唯有此情苦揚州柳垂官路有輕盈換馬端正窺户酒醒明月下夢逐潮聲去文章信美知何用謾贏得天涯羈旅教説與春來要尋花伴侣側犯詠芍藥恨春易去甚春却向揚州住微雨正繭栗梢頭㺯詩句紅橋二十四總是行雲處無語漸半脫宫衣笑相顧金壺細葉千朵圍歌舞誰念我鬢成絲來此共尊俎後日西園緑陰無數寂寞劉郎自修花譜水龍吟黃慶長夜泛鑑湖有懷歸之曲課豫和之夜深客子移舟處兩兩沙禽驚起紅衣入槳青燈搖浪微涼意思把酒臨風不思歸去有如此水況茂陵遊倦長干望久芳心事簫聲裏屈指歸期尚未鵲南飛有人應喜畫闌桂子留香小待提攜影底我已情多十年幽夢略曾如此甚謝郎也恨飄零解道月明千里探春慢豫自孩幼從先人宦于古沔女須因嫁焉中去復來幾二十年豈惟姊弟之愛沔之父老兒女子亦莫不豫愛也丙午冬千巖老人約豫過苕霅歲晚乘濤載雪而下顧念依依殆不能去作此曲别鄭次臯辛克清姚剛中諸君衰草愁煙亂鴉送日風沙回旋平野拂雪金鞭欺寒茸帽還記章臺走馬誰念漂零久謾贏得幽懷難寫故人清沔相逢小窗間共情話長恨離多會少重訪問竹西珠淚盈把雁磧波平漁汀人散老去不堪遊冶無奈苕溪月又照我扁舟東下甚日歸來梅花零亂春夜八歸湘中送胡德華芳蓮墜粉疏桐吹緑庭院暗雨乍歇無端抱影銷魂處還見篠牆螢暗蘚階蛩切送客重尋西去路問水面琵琶誰撥最可惜一片江山總付與啼鴂長恨相從未欵而今何事又對西風離别渚寒煙淡棹移人逺縹眇行舟如葉想文君望久倚竹愁生步羅襪歸來後翠尊雙飲下了珠簾玲瓏間看月解連環玉鞭重倚却沈吟未上又縈離思為大喬能撥春風小喬妙移箏雁啼秋水柳怯雲鬆更何必十分梳洗道郎攜羽扇那日隔簾半面曾記西窗夜涼雨霽歎幽歡未足何事輕棄問後約空指薔薇算如此溪山甚時重至水驛燈昏又見在曲屏近底念唯有夜來皓月照伊自睡喜遷鶯慢功父新第落成玉珂朱組又占了道人林下真趣窗户新成青紅猶潤雙燕為君胥宇秦淮貴人宅第問誰記六朝歌舞總付與在柳橋花館玲瓏深處居士間記取高卧未成且種松千樹覔句堂深寫經窗靜他日任聽風雨列仙更教誰做一院雙成儔侶世間住且休將雞犬雲中飛去摸魚兒辛亥秋期豫寓合肥小雨初霽偃卧窗下心事悠然起與趙君猷露坐月飲戲吟此曲蓋欲一洗鈿合金叉之塵他日野處見之甚為豫擊節也向秋來漸疏班扇雨聲時過金井堂虛己放新涼入湘竹最宜欹枕間記省又還是斜河舊約今再整天風夜冷自織錦人歸乘槎客去此意有誰領空贏得今古三星炯炯銀波相望千頃柳州老矣猶兒戲瓜果為伊三請雲路迥謾説道年年野鵲曾並影無人與問但濁酒相呼疏簾自捲微月照清飲白石道人歌曲卷三
